        const INITIAL_BLOCKS = {

            "Uttarakhand": 95, "Andhra Pradesh": 679, "Telangana": 584, "Rajasthan": 352, "Gujarat": 250,
            "Dadar & Nagar Haveli & Daman & Diu": 3, "Maharashtra": 351, "Arunachal Pradesh": 114, "Assam": 219,
            "Manipur": 68, "Meghalaya": 46, "Mizoram": 26, "Nagaland": 74, "Tripura": 58, "Chandigarh": 1,
            "Haryana": 143, "Punjab": 150, "Himachal Pradesh": 78, "Delhi": 33, "Jharkhand": 260, "Karnataka": 227,

        const STATE_PALETTE = [

            '#6366f1', '#8b5cf6', '#a855f7', '#d946ef', '#ec4899', '#f43f5e', '#dc2626', '#ea580c', '#d97706', '#65a30d',
            '#16a34a', '#059669', '#0d9488', '#0891b2', '#0284c7', '#2563eb', '#4f46e5', '#7c3aed', '#9333ea', '#c026d3',
            '#db2777', '#e11d48', '#991b1b', '#9a3412', '#92400e', '#3f6212'
        ];

        const MAPPING_LABELS = {
            id: "Well ID", lat: "Latitude", lng: "Longitude", state: "State/UT", district: "District", block: "Block", gramPanchayat: "Gram Panchayat", site: "Location Name", source: "Well Type", utilisation: "Well Utilisation",
            ion_ca: "Calcium (Ca)", ion_mg: "Magnesium (Mg)", ion_na: "Sodium (Na)", ion_k: "Potassium (K)",
            ion_hco3: "Bicarbonate (HCO3)", ion_co3: "Carbonate (CO3)", ion_cl: "Chloride (Cl)", ion_so4: "Sulphate (SO4)",
            ion_no3: "Nitrate (NO3)", ion_f: "Fluoride (F)",
            ion_ph: "pH", ion_ec: "EC", ion_th: "Total Hardness (TH)", ion_sio2: "Silica (SiO2)", ion_po4: "Phosphate (PO4)",
            ion_fe: "Iron (Fe)", ion_mn: "Manganese (Mn)", ion_cu: "Copper (Cu)", ion_zn: "Zinc (Zn)", ion_cr: "Chromium (Cr)",

        const SYMBOL_MAP = {
            ion_ca: "Ca", ion_mg: "Mg", ion_na: "Na", ion_k: "K",
            ion_hco3: "HCO3", ion_co3: "CO3", ion_cl: "Cl", ion_f: "F",
            ion_so4: "SO4", ion_no3: "NO3", ion_ph: "pH", ion_ec: "EC", ion_th: "TH",
            ion_sio2: "SiO2", ion_po4: "PO4",
            ion_fe: "Fe", ion_mn: "Mn", ion_cu: "Cu", ion_zn: "Zn", ion_cr: "Cr", 
            ion_ni: "Ni", ion_pb: "Pb", ion_cd: "Cd", ion_co: "Co", ion_se: "Se", 
            ion_as: "As", ion_u: "U", ion_ba: "Ba", ion_hg: "Hg", ion_li: "Li", 
            ion_b: "B", ion_al: "Al", ion_sr: "Sr"
        };

        // System Core Chemical Keys
        const MAJOR_KEYS = ["ion_ph", "ion_ec", "ion_co3", "ion_hco3", "ion_cl", "ion_f", "ion_so4", "ion_no3", "ion_th", "ion_ca", "ion_mg", "ion_na", "ion_k"];
        const TRACE_KEYS = ["ion_fe", "ion_mn", "ion_cu", "ion_zn", "ion_cr", "ion_ni", "ion_pb", "ion_cd", "ion_co", "ion_se", "ion_as", "ion_u", "ion_ba", "ion_hg", "ion_li", "ion_b", "ion_al", "ion_sr"];
        const OTHER_KEYS = ["ion_sio2", "ion_po4"];

        const CBE_KEYS = ["ion_ca", "ion_mg", "ion_na", "ion_k", "ion_hco3", "ion_co3", "ion_cl", "ion_so4", "ion_no3"];
        const OTHER_CHEM_KEYS = ["ion_ph", "ion_ec", "ion_th", "ion_sio2", "ion_po4", "ion_f"];
        const BASIC_KEYS = ["id", "lat", "lng", "state", "district", "block", "gramPanchayat", "site", "source", "utilisation"];

        // Default Specific 28 parameter check logic keys
        const SPECIFIC_PARAMS_LIST = [
            "ion_ph", "ion_ec", "ion_no3", "ion_cl", "ion_th", "ion_ca", "ion_mg", "ion_co3", "ion_hco3", "ion_so4", "ion_na", "ion_k", 
            "ion_al", "ion_as", "ion_ba", "ion_b", "ion_cd", "ion_cr", "ion_co", "ion_fe", "ion_pb", "ion_mn", "ion_hg", "ion_ni", "ion_se", "ion_u", "ion_zn", "ion_sr"
        ];

        const normalizeString = (s) => String(s || "").toLowerCase().replace(/\band\b/g, '').replace(/&/g, '').replace(/[^a-z0-9]/g, '');

        const toProperCase = (str) => {
            if (!str || typeof str !== 'string') return str;
            const smallWords = ['and', 'of', 'the', 'in', 'on', 'at', 'to', 'for'];
            return str.trim().split(/\s+/).map((word, index) => {
                if (index !== 0 && smallWords.includes(word.toLowerCase())) {
                    return word.toLowerCase();
                }
                if (!word) return '';
                return word.charAt(0).toUpperCase() + word.substring(1).toLowerCase();
            }).join(' ');
        };

        const isMissingValue = (val) => {
            if (val === undefined || val === null) return true;
            const str = String(val).trim().toUpperCase();
            return ["", "—", "-", "NA", "N/A", "NIL", "NILL", "NONE"].includes(str);
        };

        function App() {
            const [globalAlert, setGlobalAlert] = useState(null);
            const [uploadedFilesInfo, setUploadedFilesInfo] = useState([]); 
            const [mergedData, setMergedData] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [activeTab, setActiveTab] = useState('table');
            const [targets, setTargets] = useState(INITIAL_TARGETS);
            const [actualDistrictsMap, setActualDistrictsMap] = useState(INITIAL_DISTRICTS);
            const [actualBlocksMap, setActualBlocksMap] = useState(INITIAL_BLOCKS);
            
            const [markerSize, setMarkerSize] = useState(6);
            const [colorMode, setColorMode] = useState('validation');
            const [shapefileData, setShapefileData] = useState(null);
            
            const [shapefileStates, setShapefileStates] = useState([]);
            const [shapefileAliases, setShapefileAliases] = useState({});
            const [showAliasModal, setShowAliasModal] = useState(false);
            const [selectedBoundaryState, setSelectedBoundaryState] = useState("All");

            const [showSettings, setShowSettings] = useState(false);
            const [currentPage, setCurrentPage] = useState(1);
            const ROWS_PER_PAGE = 100;

            const [detectedHeaders, setDetectedHeaders] = useState(MASTER_COLUMNS);
            const [pendingFiles, setPendingFiles] = useState([]);
            const [isUploadMapping, setIsUploadMapping] = useState(false);
            
            const [boundaryProgress, setBoundaryProgress] = useState({ processing: false, percent: 0, results: null });
            const [expandedAnomalyState, setExpandedAnomalyState] = useState(null);
            const [expandedChemState, setExpandedChemState] = useState(null);

            const [customCheckParams, setCustomCheckParams] = useState(SPECIFIC_PARAMS_LIST);
            const [showCustomParamModal, setShowCustomParamModal] = useState(false);
            const [tempCustomParams, setTempCustomParams] = useState(SPECIFIC_PARAMS_LIST);

            const [matrixCols, setMatrixCols] = useState({
                target: true, districts: true, blocks: true, totalLocs: true, difference: true, missing: true, duplicates: true, boundary: true, chemAudit: true, chemLogic: true, cbe: true, springs: true, utilisation: true, achievement: true
            });
            const [showColToggle, setShowColToggle] = useState(false);
            const [headerBgColor, setHeaderBgColor] = useState('#0f172a'); // Default Slate-900
            const [selectedMatrixState, setSelectedMatrixState] = useState(null);

            const [config, setConfig] = useState({
                headers: MASTER_COLUMNS,
                mapping: {
                    id: "Well_ID", lat: "Latitude (Degree-Decimal)", lng: "Longitude (Degree-Decimal)",
                    state: "State/UT (as per LGD)", district: "District Name (as per LGD)", block: "Block Name (as per LGD)", gramPanchayat: "Gram Panchayat",
                    site: "Location Name", source: "Well_Type (Dug Well/Bore Well/Tube Well/Dug-cum-Bore Well/Spring)", utilisation: "Well_Utilisation (Irrigation/Drinking/Irrigation+Drinking)",
                    ion_ca: "Ca (mg/L)", ion_mg: "Mg (mg/L)", ion_na: "Na (mg/L)", ion_k: "K (mg/L)",
                    ion_hco3: "HCO3 (mg/L)", ion_co3: "CO3 (mg/L)", ion_cl: "Cl (mg/L)", ion_f: "F (mg/L)",
                    ion_so4: "SO4 (mg/L)", ion_no3: "NO3 (mg/L)",
                    ion_ph: "pH", ion_ec: "EC (µS/Cm at 25° C)", ion_th: "TH (mg/L as CaCO3)",
                    ion_sio2: "SiO2 (mg/L)", ion_po4: "PO4 (mg/L)",
                    ion_fe: "Fe (mg/L)", ion_mn: "Mn (mg/L)", ion_cu: "Cu (mg/L)", ion_zn: "Zn (mg/L)", ion_cr: "Cr (mg/L)",
                    ion_ni: "Ni (mg/L)", ion_pb: "Pb (mg/L)", ion_cd: "Cd (mg/L)", ion_co: "Co (mg/L)", ion_se: "Se (mg/L)",
                    ion_as: "As (ppb)", ion_u: "U (ppb)", ion_ba: "Ba (mg/L)", ion_hg: "Hg (mg/L)", ion_li: "Li (mg/L)",
                    ion_b: "B (mg/L)", ion_al: "Al (mg/L)", ion_sr: "Sr (mg/L)"
                }
            });

            const [tempHeadersText, setTempHeadersText] = useState(MASTER_COLUMNS.join(", "));
            const [tempMapping, setTempMapping] = useState(config.mapping);

            const mergedDataRef = useRef(mergedData);
            const configRef = useRef(config);
            useEffect(() => { mergedDataRef.current = mergedData; }, [mergedData]);
            useEffect(() => { configRef.current = config; }, [config]);

            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const markersLayer = useRef(null);
            const shapeLayerRef = useRef(null);
            
            const [duplicateSets, setDuplicateSets] = useState({ wellIds: new Set(), coordinatePairs: new Set() });

            const stateColorMap = useMemo(() => {
                const map = {};
                let colorIdx = 0;
                const { state: stateCol } = config.mapping;
                mergedData.forEach(row => {
                    const s = String(row[stateCol] || "Unknown").trim();
                    if (s && s !== "Unknown" && s !== "—" && !map[s]) {
                        map[s] = STATE_PALETTE[colorIdx % STATE_PALETTE.length];
                        colorIdx++;
                    }
                });
                return map;
            }, [mergedData, config.mapping]);

            useEffect(() => {
                if (mergedData.length === 0) {
                    setDuplicateSets({ wellIds: new Set(), coordinatePairs: new Set() });
                    return;
                }

                const wellCounts = {};
                const coordCounts = {};
                const { id: idCol, lat: latCol, lng: lngCol, source: sourceCol } = config.mapping;

                mergedData.forEach(row => {
                    const w = String(row[idCol] || "").trim();
                    const src = String(row[sourceCol] || "").trim().toLowerCase();
                    const la = parseFloat(row[latCol]);
                    const lo = parseFloat(row[lngCol]);
                    
                    const isSpring = w.toLowerCase().includes("spring") || src.includes("spring");
                    
                    if (!isSpring && w && w !== "—" && w !== "") {
                        wellCounts[w] = (wellCounts[w] || 0) + 1;
                    }
                    if (!isNaN(la) && !isNaN(lo)) {
                        const pair = `${la.toFixed(6)}|${lo.toFixed(6)}`;
                        coordCounts[pair] = (coordCounts[pair] || 0) + 1;
                    }
                });

                setDuplicateSets({
                    wellIds: new Set(Object.keys(wellCounts).filter(k => wellCounts[k] > 1)),
                    coordinatePairs: new Set(Object.keys(coordCounts).filter(k => coordCounts[k] > 1))
                });
            }, [mergedData, config.mapping]);

            const auditSummary = useMemo(() => {
                const { id: idCol, lat: latCol, lng: lngCol, site: siteCol, district: distCol, state: stateCol, source: sourceCol, block: blockCol } = config.mapping;
                let incomplete = 0;
                
                mergedData.forEach(row => {
                    const wVal = String(row[idCol] || "").trim();
                    const srcVal = String(row[sourceCol] || "").trim().toLowerCase();
                    const la = parseFloat(row[latCol]);
                    const lo = parseFloat(row[lngCol]);
                    
                    const isSpring = wVal.toLowerCase().includes("spring") || srcVal.includes("spring");
                    const isMissingWellId = !isSpring && isMissingValue(row[idCol]); 
                    
                    if (isMissingWellId || isNaN(la) || isNaN(lo) || isMissingValue(row[siteCol]) || isMissingValue(row[distCol]) || isMissingValue(row[blockCol]) || isMissingValue(row[stateCol])) {
                        incomplete++;
                    }
                });

                return {
                    total: mergedData.length,
                    wellDups: duplicateSets.wellIds.size,
                    coordDups: duplicateSets.coordinatePairs.size,
                    incomplete: incomplete
                };
            }, [mergedData, duplicateSets, config.mapping]);

            useEffect(() => {
                if (!shapefileData || mergedData.length === 0 || !window.turf) {
                    setBoundaryProgress({ processing: false, percent: 0, results: null });
                    return;
                }

                setBoundaryProgress({ processing: true, percent: 0, results: null });

                const polyMap = new Map();
                
                turf.flattenEach(shapefileData, (currentFeature) => {
                    const props = currentFeature.properties || {};
                    const rawName = props.States || props.STATE_NAME || props.ST_NM || props.NAME_1 || props.STATE || "Unknown";
                    
                    const aliasedName = shapefileAliases[rawName] || rawName;
                    
                    const normalizedName = normalizeString(aliasedName);
                    if (!polyMap.has(normalizedName)) polyMap.set(normalizedName, []);
                    polyMap.get(normalizedName).push(currentFeature);
                });

                const stats = { total: mergedData.length, valid: 0, wrongState: 0, outOfBounds: 0, stateDetails: {} };
                const { lat: latCol, lng: lngCol, state: stateCol, id: idCol } = config.mapping;

                let i = 0;
                const CHUNK_SIZE = 2500;

                const processChunk = () => {
                    const end = Math.min(i + CHUNK_SIZE, mergedData.length);
                    for (; i < end; i++) {
                        const row = mergedData[i];
                        const lat = parseFloat(row[latCol]);
                        const lng = parseFloat(row[lngCol]);
                        const rawState = row[stateCol] || "Unknown";
                        const rowState = normalizeString(rawState);
                        const wellId = String(row[idCol] || "Unknown").trim();

                        if (!stats.stateDetails[rawState]) {
                            stats.stateDetails[rawState] = { valid: 0, wrongState: 0, outOfBounds: 0, anomalies: [] };
                        }

                        if (isNaN(lat) || isNaN(lng)) continue;

                        const pt = turf.point([lng, lat]);
                        let inReportedState = false;
                        let actualStateFound = null;

                        const statePolys = polyMap.get(rowState) || [];
                        for (const poly of statePolys) {
                            if (turf.booleanPointInPolygon(pt, poly)) {
                                inReportedState = true;
                                break;
                            }
                        }

                        if (inReportedState) {
                            stats.valid++;
                            stats.stateDetails[rawState].valid++;
                        } else {
                            let inAnyState = false;
                            for (const [sName, polys] of polyMap.entries()) {
                                if (sName === rowState) continue;
                                for (const poly of polys) {
                                    if (turf.booleanPointInPolygon(pt, poly)) {
                                        inAnyState = true;
                                        const p = poly.properties;
                                        const rawActualName = p.States || p.STATE_NAME || p.ST_NM || p.NAME_1 || p.STATE || sName;
                                        actualStateFound = shapefileAliases[rawActualName] || rawActualName;
                                        break;
                                    }
                                }
                                if (inAnyState) break;
                            }

                            if (inAnyState) {
                                stats.wrongState++;
                                stats.stateDetails[rawState].wrongState++;
                                stats.stateDetails[rawState].anomalies.push({ id: wellId, type: 'Wrong State', actual: actualStateFound, row: row });
                            } else {
                                stats.outOfBounds++;
                                stats.stateDetails[rawState].outOfBounds++;
                                stats.stateDetails[rawState].anomalies.push({ id: wellId, type: 'Out of Bounds', actual: 'None / Sea / Foreign', row: row });
                            }
                        }
                    }
                    
                    const percent = Math.round((end / mergedData.length) * 100);
                    
                    if (end < mergedData.length) {
                        setBoundaryProgress({ processing: true, percent, results: null });
                        setTimeout(processChunk, 10);
                    } else {
                        setBoundaryProgress({ processing: false, percent: 100, results: stats });
                    }
                };

                setTimeout(processChunk, 100);

            }, [mergedData, shapefileData, config.mapping, shapefileAliases]);

            const blockAuditResults = useMemo(() => {
                if (mergedData.length === 0) return [];
                const { state: sCol, district: dCol, block: bCol } = config.mapping;
                const entityMap = new Map();
                mergedData.forEach(row => {
                    const state = String(row[sCol] || "Unknown").trim();
                    const dist = String(row[dCol] || "Unknown").trim();
                    const block = String(row[bCol] || "Unknown").trim();
                    if(!block || block === "—" || block === "Unknown") return;

                    const key = `${state}|${dist}|${block}`;
                    if (!entityMap.has(key)) {
                        entityMap.set(key, { state, dist, block, norm: normalizeString(block) });
                    }
                });

                const entities = Array.from(entityMap.values());
                const results = [];
                const processedKeys = new Set();

                const getEditDist = (a, b) => {
                    if (a.length === 0) return b.length;
                    if (b.length === 0) return a.length;
                    const matrix = [];
                    for (let i = 0; i <= b.length; i++) matrix[i] = [i];
                    for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
                    for (let i = 1; i <= b.length; i++) {
                        for (let j = 1; j <= a.length; j++) {
                            if (b.charAt(i - 1) === a.charAt(j - 1)) {
                                matrix[i][j] = matrix[i - 1][j - 1];
                            } else {
                                matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
                            }
                        }
                    }
                    return matrix[b.length][a.length];
                };

                for (let i = 0; i < entities.length; i++) {
                    const e1 = entities[i];
                    const key1 = `${e1.state}|${e1.dist}|${e1.block}`;
                    if (processedKeys.has(key1)) continue;

                    const group = [e1];
                    processedKeys.add(key1);

                    for (let j = i + 1; j < entities.length; j++) {
                        const e2 = entities[j];
                        const key2 = `${e2.state}|${e2.dist}|${e2.block}`;
                        if (processedKeys.has(key2)) continue;

                        let isMatch = false;
                        if (e1.norm === e2.norm) {
                            isMatch = true;
                        } else if (e1.norm.length >= 4 && Math.abs(e1.norm.length - e2.norm.length) <= 2 && e1.norm[0] === e2.norm[0]) {
                            const dist = getEditDist(e1.norm, e2.norm);
                            const threshold = e1.norm.length >= 7 ? 2 : 1;
                            if (dist <= threshold) isMatch = true;
                        }

                        if (isMatch) {
                            group.push(e2);
                            processedKeys.add(key2);
                        }
                    }

                    if (group.length > 1) {
                        const allNorms = new Set(group.map(g => g.norm));
                        let groupType = "Nearly Same Names (Fuzzy Match)";
                        if (allNorms.size === 1) {
                            const allOriginals = new Set(group.map(g => g.block));
                            groupType = allOriginals.size === 1 ? "Exact Same Name Multiple Districts" : "Formatting / Spelling Variations";
                        }
                        results.push({ id: results.length + 1, type: groupType, members: group });
                    }
                }
                return results.sort((a, b) => a.type.localeCompare(b.type));
            }, [mergedData, config.mapping]);

            const findNearestWell = (clickLat, clickLng) => {
                let nearest = null;
                let minDistance = 0.005; 
                const { lat: latCol, lng: lngCol } = configRef.current.mapping;
                
                mergedDataRef.current.forEach(well => {
                    const wLat = parseFloat(well[latCol]);
                    const wLng = parseFloat(well[lngCol]);
                    if (!isNaN(wLat) && !isNaN(wLng)) {
                        const dist = Math.sqrt(Math.pow(wLat - clickLat, 2) + Math.pow(wLng - clickLng, 2));
                        if (dist < minDistance) {
                            minDistance = dist;
                            nearest = { ...well };
                        }
                    }
                });
                return nearest;
            };

            useEffect(() => {
                if (activeTab !== 'map' || !mapRef.current) return;

                const map = L.map(mapRef.current, { preferCanvas: true }).setView([20.5937, 78.9629], 5);
                mapInstance.current = map;
                
                const googleSat = L.tileLayer('http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {

                });
                const googleHybrid = L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {

                const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

            useEffect(() => {

            // Data analytics processing
            const auditData = useMemo(() => {
                const stats = {};
                const statePairTracker = {};
                const { state: stateCol, id: idCol, site: siteCol, lat: latCol, lng: lngCol, district: distCol, source: sourceCol, block: blockCol, gp: gpCol, utilisation: utilCol } = config.mapping;

                mergedData.forEach(row => {
                    const stateName = row[stateCol] || 'Unspecified';
                    if (!stats[stateName]) {
                        stats[stateName] = { 
                            wellIds: [], siteNames: [], lats: [], lngs: [],
                            wellIdDups: 0, coordPairDups: 0, missingData: 0, springs: 0,
                            missingWellId: 0, missingCoords: 0, missingLoc: 0, missingDist: 0, missingBlock: 0, missingGP: 0, missingSource: 0,
                            uniqueDistricts: new Set(), uniqueBlocks: new Set(),
                            cbeCalculable: 0, cbeWithin5: 0, cbe5To10: 0, cbeAbove10: 0,
                            completeSpecificChems: 0,
                            missingMajor: 0, missingTrace: 0, missingOther: 0,
                            missingMajorParams: new Set(), missingTraceParams: new Set(), missingOtherParams: new Set(),
                            utilIrrigation: 0, utilDrinking: 0, utilBoth: 0, utilOther: 0, utilMissing: 0,
                            invalidPhCo3: 0, invalidThCaMg: 0
                        };
                        statePairTracker[stateName] = [];
                    }
                    
                    const wellId = String(row[idCol] || '').trim();
                    const srcVal = String(row[sourceCol] || "").trim().toLowerCase();
                    const site = String(row[siteCol] || '').trim();
                    const dist = String(row[distCol] || '').trim();
                    const block = String(row[blockCol] || '').trim();
                    const gp = String(row[gpCol] || '').trim();
                    const stateVal = String(row[stateCol] || '').trim();
                    const latRaw = parseFloat(row[latCol]);
                    const lngRaw = parseFloat(row[lngCol]);
                    const pair = (!isNaN(latRaw) && !isNaN(lngRaw)) ? `${latRaw.toFixed(6)}|${lngRaw.toFixed(6)}` : null;

                    const isSpring = wellId.toLowerCase().includes("spring") || srcVal.includes("spring");
                    if (isSpring) stats[stateName].springs++;

                    const isMissingWellId = !isSpring && isMissingValue(row[idCol]);
                    
                    if (isMissingWellId) stats[stateName].missingWellId++;
                    if (isNaN(latRaw) || isNaN(lngRaw)) stats[stateName].missingCoords++;
                    if (isMissingValue(row[siteCol])) stats[stateName].missingLoc++;
                    if (isMissingValue(row[distCol])) stats[stateName].missingDist++;
                    if (isMissingValue(row[blockCol])) stats[stateName].missingBlock++;
                    if (isMissingValue(row[gpCol])) stats[stateName].missingGP++;
                    if (isMissingValue(row[sourceCol])) stats[stateName].missingSource++;

                    const isMissing = isMissingWellId || isNaN(latRaw) || isNaN(lngRaw) || isMissingValue(row[siteCol]) || isMissingValue(row[distCol]) || isMissingValue(row[blockCol]) || isMissingValue(row[stateCol]);
                    if (isMissing) stats[stateName].missingData++;

                    if (dist && dist !== "—") stats[stateName].uniqueDistricts.add(dist);
                    if (block && block !== "—") stats[stateName].uniqueBlocks.add(block);

                    if (wellId && wellId !== "—" && wellId !== "") {
                        if (!isSpring) {
                            if (stats[stateName].wellIds.includes(wellId)) stats[stateName].wellIdDups++;
                        }
                        stats[stateName].wellIds.push(wellId);
                    }
                    if (site) stats[stateName].siteNames.push(site);
                    if (!isNaN(latRaw)) stats[stateName].lats.push(latRaw);
                    if (!isNaN(lngRaw)) stats[stateName].lngs.push(lngRaw);
                    
                    if (pair) {
                        if (statePairTracker[stateName].includes(pair)) stats[stateName].coordPairDups++;
                        statePairTracker[stateName].push(pair);
                    }

                    // --- Well Utilisation Logic ---
                    const rawUtilVal = row[utilCol];
                    if (isMissingValue(rawUtilVal)) {
                        stats[stateName].utilMissing++;
                    } else {
                        const utilVal = String(rawUtilVal).trim().toLowerCase();
                        if (utilVal === "irrigation+drinking" || utilVal.includes("both") || utilVal.includes("+") || (utilVal.includes("irrigation") && utilVal.includes("drinking"))) {
                            stats[stateName].utilBoth++;
                        } else if (utilVal.includes("irrigation")) {
                            stats[stateName].utilIrrigation++;
                        } else if (utilVal.includes("drinking")) {
                            stats[stateName].utilDrinking++;
                        } else {
                            stats[stateName].utilOther++;
                        }
                    }

                    // --- Chemical Audit Strict Missing Logic ---
                    // IMPORTANT FIX: If a column is unmapped (!col), it's intentionally SKIPPED, so it is NOT flagged as a missing anomaly
                    const getMissingStrict = (keys) => keys.filter(key => {
                        const col = config.mapping[key];
                        if (!col) return false; 
                        return isMissingValue(row[col]);
                    });

                    // Specific Custom Param Check (If you ask "Are these N params present?", an unmapped param = NOT present)
                    const isSpecificChemComplete = customCheckParams.length > 0 && customCheckParams.every(key => {
                        const col = config.mapping[key];
                        if (!col) return false;
                        return !isMissingValue(row[col]);
                    });
                    if (isSpecificChemComplete) {
                        stats[stateName].completeSpecificChems++;
                    }

                    const missingMajors = getMissingStrict(MAJOR_KEYS);
                    if (missingMajors.length > 0) {
                        stats[stateName].missingMajor++;
                        missingMajors.forEach(k => stats[stateName].missingMajorParams.add(SYMBOL_MAP[k] || k));
                    }

                    const missingTraces = getMissingStrict(TRACE_KEYS);
                    if (missingTraces.length > 0) {
                        stats[stateName].missingTrace++;
                        missingTraces.forEach(k => stats[stateName].missingTraceParams.add(SYMBOL_MAP[k] || k));
                    }

                    const missingOtherList = getMissingStrict(OTHER_KEYS);
                    if (missingOtherList.length > 0) {
                        stats[stateName].missingOther++;
                        missingOtherList.forEach(k => stats[stateName].missingOtherParams.add(SYMBOL_MAP[k] || k));
                    }

                    // --- Dynamic Charge Balance Error & Logic Data Handling ---
                    const getIon = (mappedCol) => {
                        if (!mappedCol) return 0; // If user did not map this ion, assume 0 contribution
                        
                        let val = row[mappedCol];
                        if (isMissingValue(val)) return 0; // Explicitly missing treated as 0 contribution
                        
                        const strVal = String(val).toUpperCase().trim();
                        if (strVal === 'BDL' || strVal === 'ND' || strVal.startsWith('<')) return 0; 
                        
                        const parsed = parseFloat(val);
                        return isNaN(parsed) ? 0 : parsed;
                    };

                    // Data Quality Logic Evaluator (Applied to ALL valid rows containing the respective parameters)
                    const phCol = config.mapping.ion_ph;
                    const co3Col = config.mapping.ion_co3;
                    const caCol = config.mapping.ion_ca;
                    const mgCol = config.mapping.ion_mg;
                    const thCol = config.mapping.ion_th;

                    const ph = getIon(phCol);
                    const co3 = getIon(co3Col);
                    const ca = getIon(caCol);
                    const mg = getIon(mgCol);
                    const th = getIon(thCol);

                    if (phCol && co3Col && !isMissingValue(row[phCol]) && !isMissingValue(row[co3Col])) {
                        if ((ph < 8.3 && co3 > 0) || (ph > 8.3 && co3 === 0)) {
                            stats[stateName].invalidPhCo3++;
                        }
                    }
                    
                    const ca_meq = ca / 20.039;
                    const mg_meq = mg / 12.152;
                    const th_meq = th / 50.045;

                    if (thCol && caCol && mgCol && !isMissingValue(row[thCol]) && !isMissingValue(row[caCol]) && !isMissingValue(row[mgCol])) {
                        // Exact match requirement (allowing 0.1 meq/L tolerance to account for standard laboratory integer rounding)
                        if (Math.abs(th_meq - (ca_meq + mg_meq)) > 0.1) { 
                            stats[stateName].invalidThCaMg++;
                        }
                    }

                    const na = getIon(config.mapping.ion_na);
                    const k = getIon(config.mapping.ion_k);
                    const hco3 = getIon(config.mapping.ion_hco3);
                    const cl = getIon(config.mapping.ion_cl);
                    const so4 = getIon(config.mapping.ion_so4);
                    const no3 = getIon(config.mapping.ion_no3);

                    const na_meq = na / 22.990;
                    const k_meq = k / 39.098;
                    const hco3_meq = hco3 / 61.017;
                    const co3_meq = co3 / 30.004;
                    const cl_meq = cl / 35.453;
                    const so4_meq = so4 / 48.030;
                    const no3_meq = no3 / 62.005;

                    const sumCat = ca_meq + mg_meq + na_meq + k_meq;
                    const sumAn = hco3_meq + co3_meq + cl_meq + so4_meq + no3_meq; // Excludes Fluoride
                    
                    if (sumCat > 0 && sumAn > 0) {
                        const cbe = ((sumCat - sumAn) / (sumCat + sumAn)) * 100;
                        const absCbe = Math.abs(cbe);
                        
                        stats[stateName].cbeCalculable++;
                        if (absCbe <= 5) stats[stateName].cbeWithin5++;
                        else if (absCbe <= 10) stats[stateName].cbe5To10++;
                        else stats[stateName].cbeAbove10++;
                    }
                });

                return Object.entries(stats).map(([name, s]) => {
                    const targetSamples = targets[name] || 0;
                    const actDists = actualDistrictsMap[name] || 0;
                    const actBlocks = actualBlocksMap[name] || 0;
                    const achievement = targetSamples > 0 ? ((s.siteNames.length * 100) / targetSamples).toFixed(2) : "0.00";
                    
                    const boundaryDetails = boundaryProgress.results?.stateDetails?.[name];

                    return {
                        name, samplesTarget: targetSamples, wellAvailable: s.wellIds.length,
                        locationsAvailable: s.siteNames.length, latAvailable: s.lats.length,
                        lngAvailable: s.lngs.length, wellDups: s.wellIdDups, 
                        coordDups: s.coordPairDups, missingData: s.missingData, 
                        missingWellId: s.missingWellId, missingCoords: s.missingCoords,
                        missingLoc: s.missingLoc, missingDist: s.missingDist, missingBlock: s.missingBlock, missingGP: s.missingGP, missingSource: s.missingSource,
                        springs: s.springs, achievement, datasetDistricts: s.uniqueDistricts.size,
                        actualDistricts: actDists, datasetBlocks: s.uniqueBlocks.size, actualBlocks: actBlocks,
                        validBound: boundaryDetails?.valid ?? null,
                        wrongState: boundaryDetails?.wrongState ?? null,
                        outOfBounds: boundaryDetails?.outOfBounds ?? null,
                        cbeCalculable: s.cbeCalculable,
                        cbeWithin5: s.cbeWithin5,
                        cbe5To10: s.cbe5To10,
                        cbeAbove10: s.cbeAbove10,
                        completeSpecificChems: s.completeSpecificChems,
                        missingMajor: s.missingMajor,
                        missingMajorParams: Array.from(s.missingMajorParams).join(", "),
                        missingTrace: s.missingTrace,
                        missingTraceParams: Array.from(s.missingTraceParams).join(", "),
                        missingOther: s.missingOther,
                        missingOtherParams: Array.from(s.missingOtherParams).join(", "),
                        utilIrrigation: s.utilIrrigation,
                        utilDrinking: s.utilDrinking,
                        utilBoth: s.utilBoth,
                        utilOther: s.utilOther,
                        utilMissing: s.utilMissing,
                        invalidPhCo3: s.invalidPhCo3,
                        invalidThCaMg: s.invalidThCaMg
                    };
                }).sort((a, b) => a.name.localeCompare(b.name));
            }, [mergedData, targets, config, actualDistrictsMap, actualBlocksMap, boundaryProgress, customCheckParams]);

            const auditTotals = useMemo(() => {
                if (!auditData || auditData.length === 0) return null;
                const totals = {
                    samplesTarget: 0, actualDistricts: 0, datasetDistricts: 0,
                    actualBlocks: 0, datasetBlocks: 0, locationsAvailable: 0,
                    missingWellId: 0, missingCoords: 0, missingLoc: 0, missingDist: 0, missingBlock: 0, missingGP: 0, missingSource: 0,
                    wellDups: 0, coordDups: 0, wrongState: 0, outOfBounds: 0, springs: 0,
                    hasBoundaryData: false,
                    cbeCalculable: 0, cbeWithin5: 0, cbe5To10: 0, cbeAbove10: 0,
                    completeSpecificChems: 0, missingMajor: 0, missingTrace: 0, missingOther: 0,
                    utilIrrigation: 0, utilDrinking: 0, utilBoth: 0, utilOther: 0, utilMissing: 0,
                    invalidPhCo3: 0, invalidThCaMg: 0
                };

                auditData.forEach(s => {
                    totals.samplesTarget += Number(s.samplesTarget) || 0;
                    totals.actualDistricts += Number(s.actualDistricts) || 0;
                    totals.datasetDistricts += Number(s.datasetDistricts) || 0;
                    totals.actualBlocks += Number(s.actualBlocks) || 0;
                    totals.datasetBlocks += Number(s.datasetBlocks) || 0;
                    totals.locationsAvailable += Number(s.locationsAvailable) || 0;
                    totals.missingWellId += Number(s.missingWellId) || 0;
                    totals.missingCoords += Number(s.missingCoords) || 0;
                    totals.missingLoc += Number(s.missingLoc) || 0;
                    totals.missingDist += Number(s.missingDist) || 0;
                    totals.missingBlock += Number(s.missingBlock) || 0;
                    totals.missingGP += Number(s.missingGP) || 0;
                    totals.missingSource += Number(s.missingSource) || 0;
                    totals.wellDups += Number(s.wellDups) || 0;
                    totals.coordDups += Number(s.coordDups) || 0;
                    totals.springs += Number(s.springs) || 0;
                    
                    totals.cbeCalculable += Number(s.cbeCalculable) || 0;
                    totals.cbeWithin5 += Number(s.cbeWithin5) || 0;
                    totals.cbe5To10 += Number(s.cbe5To10) || 0;
                    totals.cbeAbove10 += Number(s.cbeAbove10) || 0;

                    totals.completeSpecificChems += Number(s.completeSpecificChems) || 0;
                    totals.missingMajor += Number(s.missingMajor) || 0;
                    totals.missingTrace += Number(s.missingTrace) || 0;
                    totals.missingOther += Number(s.missingOther) || 0;

                    totals.utilIrrigation += Number(s.utilIrrigation) || 0;

                    totals.utilBoth += Number(s.utilBoth) || 0;
                    totals.utilOther += Number(s.utilOther) || 0;

                    totals.invalidPhCo3 += Number(s.invalidPhCo3) || 0;

                    if (s.wrongState !== null) {

                });

                totals.difference = totals.locationsAvailable - totals.samplesTarget;
                totals.achievement = totals.samplesTarget > 0 ? ((totals.locationsAvailable * 100) / totals.samplesTarget).toFixed(2) : "0.00";

                return totals;
            }, [auditData]);

            const stateDistrictSummary = useMemo(() => {
                const result = {};
                const { state: sCol, district: dCol } = config.mapping;
                mergedData.forEach(row => {
                    const state = String(row[sCol] || "Unknown").trim();

                    if (!result[state]) result[state] = {};

                const tableData = [];
                let slNo = 1;
                for (const state of Object.keys(result).sort()) {
