                                                                                                            <td className="p-3">{ano.row?.[config.mapping.district] || "—"}</td>
                                                                                                            <td className="p-3">{ano.row?.[config.mapping.block] || "—"}</td>
                                                                                                            <td className="p-3 text-slate-400">{ano.row?.[config.mapping.lat]}, {ano.row?.[config.mapping.lng]}</td>
                                                                                                            <td className="p-3">
                                                                                                                <span className={`px-2 py-1 rounded text-[9px] font-black uppercase tracking-widest ${ano.type === 'Wrong State' ? 'bg-amber-500/20 text-amber-400' : 'bg-red-500/20 text-red-400'}`}>
                                                                                                                    {ano.type}
                                                                                                                </span>
                                                                                                            </td>
                                                                                                            <td className="p-3 font-bold text-white">{ano.actual}</td>
                                                                                                        </tr>
                                                                                                    ))}
                                                                                                </tbody>
                                                                                            </table>
                                                                                        </div>
                                                                                    </td>
                                                                                </tr>
                                                                            )}
                                                                        </React.Fragment>
                                                                    );
                                                                })}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {activeTab === 'map' && (
                                    <div className="p-4 flex flex-col h-[650px] gap-6 animate-in">
                                        <div className="flex-1 flex flex-col w-full">
                                            
                                            {/* Map Controls */}
                                            <div className="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4 bg-slate-50 p-4 rounded-3xl border border-slate-200">
                                                <div>
                                                    <h3 className="text-lg font-black text-slate-800">Spatial Distribution Intelligence</h3>
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Interactive GIS Environment</p>
                                                </div>
                                                <div className="flex flex-wrap items-center gap-6">
                                                    
                                                    {/* Shapefile Boundary Upload */}
                                                    <div className="flex flex-col gap-1 relative">
                                                        <label className="text-[9px] font-black uppercase text-slate-500 tracking-wider">Boundary Overlay</label>
                                                        <div className="flex items-center gap-2">
                                                            <input 
                                                                type="file" 
                                                                id="shp-upload"
                                                                multiple 
                                                                accept=".shp,.dbf,.shx,.prj,.cpg,.zip" 
                                                                onChange={handleShapefileUpload} 
                                                                className="hidden"
                                                            />
                                                            <label htmlFor="shp-upload" className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-bold cursor-pointer transition-colors ${shapefileData ? 'bg-blue-100 text-blue-700 hover:bg-blue-200 border-blue-200 border' : 'bg-white border-slate-200 border hover:bg-slate-100 text-slate-700'}`}>
                                                                <i className={`ph ${shapefileData ? 'ph-check-circle' : 'ph-upload-simple'}`}></i>
                                                                {shapefileData ? "Shapefile Loaded" : "Upload .SHP / .ZIP"}
                                                            </label>
                                                            {shapefileData && (
                                                                <>
                                                                    <button onClick={() => setShowAliasModal(true)} className="flex items-center justify-center w-8 h-8 bg-amber-50 border border-amber-200 text-amber-600 rounded-lg hover:bg-amber-500 hover:text-white transition-all shadow-sm" title="Edit State Names (Aliases)">
                                                                        <i className="ph ph-pencil-simple"></i>
                                                                    </button>
                                                                    <button onClick={(e) => {e.preventDefault(); setShapefileData(null); setBoundaryProgress({ processing: false, percent: 0, results: null }); setShapefileStates([]); setShapefileAliases({}); setSelectedBoundaryState("All");}} className="flex items-center justify-center w-8 h-8 bg-red-50 border border-red-200 text-red-500 rounded-lg hover:bg-red-500 hover:text-white transition-all shadow-sm" title="Remove Shapefile">
                                                                        <i className="ph ph-trash"></i>
                                                                    </button>
                                                                </>
                                                            )}
                                                        </div>
                                                    </div>

                                                    {/* Highlight State Filter (Only visible if shapefile is loaded) */}
                                                    {shapefileData && (
                                                        <>
                                                            <div className="h-8 w-px bg-slate-300 hidden md:block"></div>

                                                                <label className="text-[9px] font-black uppercase text-slate-500 tracking-wider">Highlight State</label>

                                                                    value={selectedBoundaryState}
                                                                    onChange={(e) => setSelectedBoundaryState(e.target.value)}
                                                                    className="p-1.5 border border-slate-200 rounded-lg text-[10px] font-bold text-slate-700 outline-none focus:border-blue-500 bg-white min-w-[120px] max-w-[150px] truncate"

                                                                    <option value="All">All States</option>
                                                                    {displayStates.map(st => (
                                                                        <option key={st} value={st}>{st}</option>
                                                                    ))}
                                                                </select>
                                                            </div>
                                                        </>
                                                    )}

                                                    <div className="h-8 w-px bg-slate-300 hidden md:block"></div>

                                                    {/* Color Mode Toggle */}
                                                    <div className="flex flex-col gap-1">
                                                        <label className="text-[9px] font-black uppercase text-slate-500 tracking-wider">Color Logic</label>
                                                        <div className="flex bg-slate-200 rounded-lg p-0.5">
                                                            <button onClick={() => setColorMode('validation')} className={`px-3 py-1.5 rounded-md text-[10px] font-black uppercase tracking-widest transition-all ${colorMode === 'validation' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>Validation</button>
                                                            <button onClick={() => setColorMode('state')} className={`px-3 py-1.5 rounded-md text-[10px] font-black uppercase tracking-widest transition-all ${colorMode === 'state' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>State-wise</button>
                                                        </div>
                                                    </div>

                                                    <div className="h-8 w-px bg-slate-300 hidden md:block"></div>

                                                    <div className="flex flex-col gap-1">
                                                        <label className="text-[9px] font-black uppercase text-slate-500 tracking-wider">Point Marker Radius</label>
                                                        <input type="range" min="2" max="25" value={markerSize} onChange={(e) => setMarkerSize(parseInt(e.target.value))} className="w-32 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"/>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            {/* Map Rendering Area */}
                                            <div className="flex-1 relative rounded-[2rem] overflow-hidden border-8 border-slate-100 shadow-inner group bg-slate-200 w-full">
                                                <div ref={mapRef} className="h-full w-full absolute inset-0 z-10"></div>
                                                
                                                {/* Dynamic Map Legend Overlay */}
                                                <div className="absolute bottom-6 right-6 z-[500] bg-white/95 backdrop-blur-md p-4 rounded-2xl shadow-xl border border-slate-200 max-h-[250px] overflow-y-auto custom-scrollbar min-w-[180px]">
                                                    <h4 className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-3 border-b border-slate-100 pb-2 sticky top-0 bg-white/95 backdrop-blur-md">Map Legend</h4>
                                                    
                                                    {colorMode === 'validation' ? (
                                                        <div className="space-y-3 text-[11px] font-bold text-slate-700">
                                                            <div className="flex items-center gap-2"><span className="w-3.5 h-3.5 rounded-full bg-blue-500 shadow-sm"></span> Unique Points</div>
                                                            <div className="flex items-center gap-2"><span className="w-3.5 h-3.5 rounded-full bg-pink-500 shadow-sm"></span> Duplicate Well ID</div>
                                                            <div className="flex items-center gap-2"><span className="w-3.5 h-3.5 rounded-full bg-red-500 shadow-sm"></span> Overlapping Coords</div>
                                                        </div>
                                                    ) : (
                                                        <div className="space-y-2 text-[10px] font-bold text-slate-700">
                                                            {Object.keys(stateColorMap).length > 0 ? (
                                                                Object.entries(stateColorMap).map(([state, color]) => (
                                                                    <div key={state} className="flex items-center gap-2">
                                                                        <span className="w-3 h-3 rounded-full border border-slate-200 shrink-0 shadow-sm" style={{ backgroundColor: color }}></span>
                                                                        <span className="truncate" title={state}>{state}</span>
                                                                    </div>
                                                                ))
                                                            ) : (
                                                                <p className="text-slate-400 font-medium">No states loaded yet.</p>
                                                            )}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
