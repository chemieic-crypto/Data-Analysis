                    if (!result[state][source]) result[state][source] = 0;

                    result[state][source]++;
                    result[state].total++;
                });

                const sources = Array.from(sourcesSet).sort();
                const tableData = [];
                let slNo = 1;

                for (const state of Object.keys(result).sort()) {
                    tableData.push({ sl: slNo++, state, counts: result[state], total: result[state].total });
                }

                return { sources, tableData };
            }, [mergedData, config.mapping]);

            const chemicalAuditData = useMemo(() => {
                const stats = {};
                const { state: stateCol, id: idCol, site: siteCol, district: distCol } = config.mapping;

                mergedData.forEach(row => {
                    const stateName = String(row[stateCol] || "Unknown").trim();
                    if (!stats[stateName]) {
                        stats[stateName] = { 
                            total: 0, 
                            completeSpecificChems: 0,
                            missingMajor: 0, missingTrace: 0, missingOther: 0, 
                            missingMajorParams: new Set(), missingTraceParams: new Set(), missingOtherParams: new Set(),
                            anomaliesMajor: [], anomaliesTrace: [], anomaliesOther: [],
                            invalidPhCo3: 0, invalidThCaMg: 0,
                            anomaliesPhCo3: [], anomaliesThCaMg: []
                        };
                    }
                    stats[stateName].total++;

                    // IMPORTANT FIX: Unmapped columns (!col) are bypassed entirely to prevent false missing anomalies across the dataset
                    const getMissingKeys = (keys) => {
                        return keys.filter(key => {
                            const col = config.mapping[key];
                            if (!col) return false; 
                            return isMissingValue(row[col]);
                        });
                    };

                    const isSpecificChemComplete = customCheckParams.length > 0 && customCheckParams.every(key => {
                        const col = config.mapping[key];
                        if (!col) return false; // If parameter unmapped, it fails the completion check
                        return !isMissingValue(row[col]);
                    });
                    if (isSpecificChemComplete) {
                        stats[stateName].completeSpecificChems++;
                    }

                    const missingMajorList = getMissingKeys(MAJOR_KEYS);
                    if (missingMajorList.length > 0) {
                        stats[stateName].missingMajor++;
                        missingMajorList.forEach(k => stats[stateName].missingMajorParams.add(SYMBOL_MAP[k] || k));
                        stats[stateName].anomaliesMajor.push({
                            id: row[idCol] || "—", site: row[siteCol] || "—", dist: row[distCol] || "—",
                            missingParams: missingMajorList.map(k => SYMBOL_MAP[k] || k).join(", ")
                        });
                    }

                    const missingTraceList = getMissingKeys(TRACE_KEYS);
                    if (missingTraceList.length > 0) {
                        stats[stateName].missingTrace++;
                        missingTraceList.forEach(k => stats[stateName].missingTraceParams.add(SYMBOL_MAP[k] || k));
                        stats[stateName].anomaliesTrace.push({
                            id: row[idCol] || "—", site: row[siteCol] || "—", dist: row[distCol] || "—",
                            missingParams: missingTraceList.map(k => SYMBOL_MAP[k] || k).join(", ")
                        });
                    }

                    const missingOtherList = getMissingKeys(OTHER_KEYS);
                    if (missingOtherList.length > 0) {
                        stats[stateName].missingOther++;
                        missingOtherList.forEach(k => stats[stateName].missingOtherParams.add(SYMBOL_MAP[k] || k));
                        stats[stateName].anomaliesOther.push({
                            id: row[idCol] || "—", site: row[siteCol] || "—", dist: row[distCol] || "—",
                            missingParams: missingOtherList.map(k => SYMBOL_MAP[k] || k).join(", ")
                        });
                    }

                    // --- Data Logic Anomalies Calculation ---
                    const getNumeric = (val) => {
                        if (isMissingValue(val)) return 0;
                        const strVal = String(val).toUpperCase().trim();
                        if (strVal === 'BDL' || strVal === 'ND' || strVal.startsWith('<')) return 0; 
                        const parsed = parseFloat(val);
                        return isNaN(parsed) ? 0 : parsed;
                    };

                    const phCol = config.mapping.ion_ph;
                    const co3Col = config.mapping.ion_co3;
                    const caCol = config.mapping.ion_ca;
                    const mgCol = config.mapping.ion_mg;
                    const thCol = config.mapping.ion_th;

                    const ph = getNumeric(row[phCol]);
                    const co3 = getNumeric(row[co3Col]);
                    const ca = getNumeric(row[caCol]);
                    const mg = getNumeric(row[mgCol]);
                    const th = getNumeric(row[thCol]);

                    if (phCol && co3Col && !isMissingValue(row[phCol]) && !isMissingValue(row[co3Col])) {
                        if (ph < 8.3 && co3 > 0) {
                            stats[stateName].invalidPhCo3++;
                            stats[stateName].anomaliesPhCo3.push({
                                id: row[idCol] || "—", site: row[siteCol] || "—", dist: row[distCol] || "—",
                                details: `pH = ${ph} (< 8.3) but CO3 = ${co3}`
                            });
                        } else if (ph > 8.3 && co3 === 0) {
                            stats[stateName].invalidPhCo3++;
                            stats[stateName].anomaliesPhCo3.push({
                                id: row[idCol] || "—", site: row[siteCol] || "—", dist: row[distCol] || "—",
                                details: `pH = ${ph} (> 8.3) but CO3 = 0`
                            });
                        }
                    }

                    if (thCol && caCol && mgCol && !isMissingValue(row[thCol]) && !isMissingValue(row[caCol]) && !isMissingValue(row[mgCol])) {
                        const ca_meq = ca / 20.039;
                        const mg_meq = mg / 12.152;
                        const th_meq = th / 50.045;

                        // Exact match requirement (allowing 0.1 meq/L tolerance to account for standard laboratory integer rounding)
                        if (Math.abs(th_meq - (ca_meq + mg_meq)) > 0.1) { 
                            stats[stateName].invalidThCaMg++;
                            stats[stateName].anomaliesThCaMg.push({
                                id: row[idCol] || "—", site: row[siteCol] || "—", dist: row[distCol] || "—",
                                details: `TH meq (${th_meq.toFixed(2)}) != Ca+Mg meq (${(ca_meq+mg_meq).toFixed(2)})`
                            });
                        }
                    }

                });

                return Object.entries(stats).map(([state, data]) => ({ state, ...data })).sort((a, b) => a.state.localeCompare(b.state));
            }, [mergedData, config.mapping, customCheckParams]);

            const guessMapping = (headers) => {
                const mapping = { id: "", lat: "", lng: "", state: "", district: "", block: "", gramPanchayat: "", site: "", source: "", utilisation: "", ion_ca: "", ion_mg: "", ion_na: "", ion_k: "", ion_hco3: "", ion_co3: "", ion_cl: "", ion_f: "", ion_so4: "", ion_no3: "", ion_ph: "", ion_ec: "", ion_th: "", ion_sio2: "", ion_po4: "", ion_fe: "", ion_mn: "", ion_cu: "", ion_zn: "", ion_cr: "", ion_ni: "", ion_pb: "", ion_cd: "", ion_co: "", ion_se: "", ion_as: "", ion_u: "", ion_ba: "", ion_hg: "", ion_li: "", ion_b: "", ion_al: "", ion_sr: "" };
                headers.forEach(h => {
                    const hl = String(h).toLowerCase();
                    if (!mapping.id && (hl.includes("id") || hl === "s_no." || hl.includes("no."))) mapping.id = h;
                    if (!mapping.lat && (hl.includes("lat"))) mapping.lat = h;
                    if (!mapping.lng && (hl.includes("lng") || hl.includes("long"))) mapping.lng = h;
                    if (!mapping.state && (hl.includes("state") || hl.includes("ut"))) mapping.state = h;
                    if (!mapping.district && (hl.includes("dist"))) mapping.district = h;
                    if (!mapping.block && (hl.includes("block") || hl.includes("tehsil") || hl.includes("mandal"))) mapping.block = h;
                    if (!mapping.gramPanchayat && (hl.includes("panchayat") || hl.match(/\bgp\b/i) || hl.includes("gram"))) mapping.gramPanchayat = h;
                    if (!mapping.site && (hl.includes("site") || hl.includes("loc") || hl.includes("village") || hl.includes("name"))) mapping.site = h;
                    if (!mapping.source && (hl.includes("type") || hl.includes("source") || hl.includes("well_type"))) mapping.source = h;
                    if (!mapping.utilisation && (hl.includes("util") || hl.includes("utilisation"))) mapping.utilisation = h;

                    if (!mapping.ion_ca && hl.match(/\bca\b/i)) mapping.ion_ca = h;
                    if (!mapping.ion_mg && hl.match(/\bmg\b/i)) mapping.ion_mg = h;
                    if (!mapping.ion_na && hl.match(/\bna\b/i)) mapping.ion_na = h;
                    if (!mapping.ion_k && hl.match(/\bk\b/i)) mapping.ion_k = h;
                    if (!mapping.ion_hco3 && hl.includes("hco3")) mapping.ion_hco3 = h;
                    if (!mapping.ion_co3 && hl.includes("co3") && !hl.includes("hco3")) mapping.ion_co3 = h;
                    if (!mapping.ion_cl && hl.match(/\bcl\b/i)) mapping.ion_cl = h;
                    if (!mapping.ion_f && hl.match(/\bf\b/i) && !hl.includes("fe")) mapping.ion_f = h; 
                    if (!mapping.ion_so4 && hl.includes("so4")) mapping.ion_so4 = h;
                    if (!mapping.ion_no3 && hl.includes("no3")) mapping.ion_no3 = h;
                    if (!mapping.ion_ph && hl.match(/\bph\b/i)) mapping.ion_ph = h;
                    if (!mapping.ion_ec && (hl.includes("ec") || hl.includes("µs/cm") || hl.includes("us/cm"))) mapping.ion_ec = h;
                    if (!mapping.ion_th && (hl.includes("th") || hl.includes('hardness'))) mapping.ion_th = h;
                    if (!mapping.ion_sio2 && hl.includes("sio2")) mapping.ion_sio2 = h;
                    if (!mapping.ion_po4 && hl.includes("po4")) mapping.ion_po4 = h;
                    
                    if (!mapping.ion_fe && hl.match(/\bfe\b/i)) mapping.ion_fe = h;
                    if (!mapping.ion_mn && hl.match(/\bmn\b/i)) mapping.ion_mn = h;
                    if (!mapping.ion_cu && hl.match(/\bcu\b/i)) mapping.ion_cu = h;
                    if (!mapping.ion_zn && hl.match(/\bzn\b/i)) mapping.ion_zn = h;
                    if (!mapping.ion_cr && hl.match(/\bcr\b/i)) mapping.ion_cr = h;
                    if (!mapping.ion_ni && hl.match(/\bni\b/i)) mapping.ion_ni = h;
                    if (!mapping.ion_pb && hl.match(/\bpb\b/i)) mapping.ion_pb = h;
                    if (!mapping.ion_cd && hl.match(/\bcd\b/i)) mapping.ion_cd = h;
                    if (!mapping.ion_co && hl.match(/\bco\b/i) && !hl.includes("co3")) mapping.ion_co = h;
                    if (!mapping.ion_se && hl.match(/\bse\b/i)) mapping.ion_se = h;
                    if (!mapping.ion_as && hl.match(/\bas\b/i)) mapping.ion_as = h;
                    if (!mapping.ion_u && hl.match(/\bu\b/i)) mapping.ion_u = h;
                    if (!mapping.ion_ba && hl.match(/\bba\b/i)) mapping.ion_ba = h;
                    if (!mapping.ion_hg && hl.match(/\bhg\b/i)) mapping.ion_hg = h;
                    if (!mapping.ion_li && hl.match(/\bli\b/i)) mapping.ion_li = h;
                    if (!mapping.ion_b && hl.match(/\bb\b/i)) mapping.ion_b = h;
                    if (!mapping.ion_al && hl.match(/\bal\b/i)) mapping.ion_al = h;
                    if (!mapping.ion_sr && hl.match(/\bsr\b/i)) mapping.ion_sr = h;
                });
                return mapping;
            };

            const applyHeaderConfig = async () => {
                const newHeaders = tempHeadersText.split(/[\n,]+/).map(s => s.trim()).filter(s => s);
                setConfig({ headers: newHeaders, mapping: tempMapping });
                setShowSettings(false);
                
                if (isUploadMapping && pendingFiles.length > 0) {
                    setIsProcessing(true);
                    try {
                        const newData = [];
                        const newFilesInfo = [];
                        for (const file of pendingFiles) {
                            const data = await readFile(file);
                            const mapped = data.map(row => {
                                const newRow = {};
                                newHeaders.forEach(col => {
                                    const key = Object.keys(row).find(k => String(k).trim().toLowerCase() === String(col).trim().toLowerCase());
                                    let val = key ? row[key] : "";
                                    
                                    if (typeof val === 'string') {
                                        val = val.trim();
                                        if (col === tempMapping.state || col === tempMapping.district || col === tempMapping.block || col === tempMapping.gramPanchayat) {
                                            val = toProperCase(val);
                                        }
                                    }
                                    newRow[col] = val;
                                });
                                newRow.Source_File = file.name;
                                return newRow;
                            });
                            newData.push(...mapped);
                            newFilesInfo.push({ name: file.name, count: mapped.length });
                        }
                        setMergedData(newData);
                        setUploadedFilesInfo(newFilesInfo);
                        setCurrentPage(1);
                    } catch (err) { console.error(err); } 
                    finally { 
                        setIsProcessing(false); 
                        setPendingFiles([]);
                        setIsUploadMapping(false);
                    }
                } else {
                    setMergedData([]);
                    setUploadedFilesInfo([]);
                    setCurrentPage(1);
                }
            };

            const handleFileUpload = (e) => {
                const selectedFiles = Array.from(e.target.files);
                if (selectedFiles.length === 0) return;
                
                setIsProcessing(true);
                try {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        try {
                            const wb = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
                            const ws = wb.Sheets[wb.SheetNames[0]];
                            const headers = XLSX.utils.sheet_to_json(ws, { header: 1 })[0] || [];
                            const validHeaders = headers.map(h => String(h).trim()).filter(h => h);
                            
                            if (validHeaders.length > 0) {
                                setDetectedHeaders(validHeaders);
                                setTempHeadersText(validHeaders.join(", "));
                                setTempMapping(guessMapping(validHeaders));
                                setPendingFiles(selectedFiles);
                                setIsUploadMapping(true);
                                setShowSettings(true);
                            } else {
                                setGlobalAlert("Could not detect any headers in the uploaded file.");
                            }
                        } catch (err) {
                            console.error("Error reading headers:", err);
                        } finally {
                            setIsProcessing(false);
                        }
                    };
                    reader.readAsArrayBuffer(selectedFiles[0]);
                } catch (err) { 
                    console.error(err); 
                    setIsProcessing(false); 
                }
                e.target.value = "";
            };

            const handleShapefileUpload = async (e) => {
                const files = Array.from(e.target.files);
                if(files.length === 0) return;
                setIsProcessing(true);
                try {
                    let buffer;
                    if(files.length === 1 && files[0].name.toLowerCase().endsWith('.zip')) {
                        buffer = await files[0].arrayBuffer();
                    } else {
                        const zip = new JSZip();
                        for(let file of files) {
                            zip.file(file.name, file);
                        }
                        buffer = await zip.generateAsync({type: "arraybuffer"});
                    }
                    
                    const geojson = await shp(buffer);
                    setShapefileData(geojson);

                    const unique = new Set();
                    turf.flattenEach(geojson, (f) => {
                        const p = f.properties || {};
                        const sName = p.States || p.STATE_NAME || p.ST_NM || p.NAME_1 || p.STATE || "Unknown";
                        if (sName !== "Unknown") unique.add(sName);
                    });
                    setShapefileStates(Array.from(unique).sort());

                } catch (err) {
                    console.error("Error parsing shapefile:", err);
                    setGlobalAlert("Failed to parse shapefile. Please ensure you upload the corresponding .shp, .dbf, .shx, and .prj files together, or a single .zip containing them.");
                } finally {
                    setIsProcessing(false);
                    e.target.value = "";
                }
            };

            const displayStates = useMemo(() => {
                const set = new Set();
                shapefileStates.forEach(s => {
                    set.add(shapefileAliases[s] || s);
                });
                return Array.from(set).sort();
            }, [shapefileStates, shapefileAliases]);

            const removeFile = (fileName) => {
                setMergedData(prev => prev.filter(row => row.Source_File !== fileName));
                setUploadedFilesInfo(prev => prev.filter(f => f.name !== fileName));
                setCurrentPage(1);
            };

            const readFile = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                        resolve(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" }));
                    };
                    reader.readAsArrayBuffer(file);
                });
            };

            const handleExport = () => {
                if (mergedData.length === 0) return;
                const { id: idCol, lat: latCol, lng: lngCol, site: siteCol, district: distCol, state: stateCol, block: blockCol, source: sourceCol } = config.mapping;
                
                // --- EXCEL STYLE CONFIGURATIONS ---
                const headerStyle = {
                    font: { name: "Times New Roman", sz: 12, bold: true, color: { rgb: "FFFFFF" } },
                    fill: { fgColor: { rgb: "333333" } }, // Light black / dark gray background
                    alignment: { vertical: "center", horizontal: "center", wrapText: true },
                    border: { top: {style: "thin"}, bottom: {style: "thin"}, left: {style: "thin"}, right: {style: "thin"} }
                };
                const cellStyle = {
                    font: { name: "Times New Roman", sz: 12 },
                    alignment: { vertical: "center", wrapText: true },
                    border: { top: {style: "thin", color: {auto: 1}}, bottom: {style: "thin", color: {auto: 1}}, left: {style: "thin", color: {auto: 1}}, right: {style: "thin", color: {auto: 1}} }
                };
                const totalStyle = {
                    font: { name: "Times New Roman", sz: 12, bold: true },
                    fill: { fgColor: { rgb: "E2E8F0" } }, // Light gray background for total row highlights
                    alignment: { vertical: "center", wrapText: true },
                    border: { top: {style: "thin"}, bottom: {style: "thin"}, left: {style: "thin"}, right: {style: "thin"} }
                };

                const formatSheet = (ws, hasTotalRow = false, isMassiveRawSheet = false) => {
                    if (!ws['!ref']) return ws;
                    const range = XLSX.utils.decode_range(ws['!ref']);
                    const colWidths = [];
                    
                    // To prevent memory bloat and massive files, only check widths on first 100 rows for raw data
                    const maxRowForWidth = isMassiveRawSheet ? Math.min(range.e.r, 100) : range.e.r;
                    
                    for (let R = range.s.r; R <= range.e.r; ++R) {
                        const isHeader = (R === 0);
                        const isTotal = hasTotalRow && (R === range.e.r);

                        for (let C = range.s.c; C <= range.e.c; ++C) {
                            const cellRef = XLSX.utils.encode_cell({r: R, c: C});
                            if (!ws[cellRef]) continue;

                            // Apply conditional styles
                            if (isHeader) {
                                ws[cellRef].s = headerStyle;
                            } else if (isTotal) {
                                ws[cellRef].s = totalStyle;
                            } else if (!isMassiveRawSheet) {
                                // Skip applying border/font objects to every single raw data cell to reduce file size drastically
                                ws[cellRef].s = cellStyle;
                            }

                            // Calculate auto-width dynamically
                            if (R <= maxRowForWidth) {
                                const cellTextLength = ws[cellRef].v ? String(ws[cellRef].v).length : 0;
                                if (!colWidths[C]) colWidths[C] = { wch: 12 }; // Default minimum width
                                if (cellTextLength > colWidths[C].wch) {
                                    colWidths[C].wch = Math.min(cellTextLength + 3, 40); // Cap width to 40 characters for better wrapping
                                }
                            }
                        }
                    }
                    ws['!cols'] = colWidths;
                    return ws;
                };

                const wb = XLSX.utils.book_new();
                const appendFormattedSheet = (data, name, hasTotal = false, isMassive = false) => {
                    if (data.length === 0) return;
                    const ws = XLSX.utils.json_to_sheet(data);
                    XLSX.utils.book_append_sheet(wb, formatSheet(ws, hasTotal, isMassive), name);
                };
                
                const processedData = mergedData.map(row => {
                    const w = String(row[idCol] || "").trim();
                    const src = String(row[sourceCol] || "").trim().toLowerCase();
                    const la = parseFloat(row[latCol]);
                    const lo = parseFloat(row[lngCol]);
                    const pair = !isNaN(la) && !isNaN(lo) ? `${la.toFixed(6)}|${lo.toFixed(6)}` : "";
                    
                    const isSpring = w.toLowerCase().includes("spring") || src.includes("spring");
                    const isMissingWellId = !isSpring && (!w || w === "—");

                    const isMissing = isMissingWellId || isNaN(la) || isNaN(lo) || isMissingValue(row[siteCol]) || isMissingValue(row[distCol]) || isMissingValue(row[blockCol]) || isMissingValue(row[stateCol]);
                    const isWellDup = !isSpring && w && w !== "—" && duplicateSets.wellIds.has(w);
                    const isCoordDup = pair && duplicateSets.coordinatePairs.has(pair);

                    // CBE Calculation for Export
                    const getIon = (mappedCol) => {
                        if (!mappedCol) return 0;
                        let val = row[mappedCol];
                        if (val === undefined || val === null || val === "" || String(val).trim() === "—") return 0;
                        const strVal = String(val).toUpperCase().trim();
                        if (strVal === 'BDL' || strVal === 'ND' || strVal.startsWith('<')) return 0;
                        const parsed = parseFloat(val);
                        return isNaN(parsed) ? 0 : parsed;
                    };
                    
                    const ca = getIon(config.mapping.ion_ca);
                    const mg = getIon(config.mapping.ion_mg);
                    const na = getIon(config.mapping.ion_na);
                    const k = getIon(config.mapping.ion_k);
                    const hco3 = getIon(config.mapping.ion_hco3);
                    const co3 = getIon(config.mapping.ion_co3);
                    const cl = getIon(config.mapping.ion_cl);
                    const so4 = getIon(config.mapping.ion_so4);
                    const no3 = getIon(config.mapping.ion_no3);

                    let cbe = "";
                    let cbeCategory = "";
                    const ca_meq = ca / 20.039;
                    const mg_meq = mg / 12.152;
                    const na_meq = na / 22.990;
                    const k_meq = k / 39.098;
                    const hco3_meq = hco3 / 61.017;
                    const co3_meq = co3 / 30.004;
                    const cl_meq = cl / 35.453;
                    const so4_meq = so4 / 48.030;
                    const no3_meq = no3 / 62.005;

                    const sumCat = ca_meq + mg_meq + na_meq + k_meq;
                    const sumAn = hco3_meq + co3_meq + cl_meq + so4_meq + no3_meq; // Excludes Fluoride

                    if (sumCat > 0 && sumAn > 0) {
                        const cbeVal = ((sumCat - sumAn) / (sumCat + sumAn)) * 100;
                        cbe = cbeVal.toFixed(2) + "%";
                        const absCbe = Math.abs(cbeVal);
                        if (absCbe <= 5) cbeCategory = "Upto ±5%";
                        else if (absCbe <= 10) cbeCategory = "> ±5% and Upto ±10%";
                        else cbeCategory = "> ±10%";
                    }

                    return { ...row, isWellDup, isCoordDup, isMissing, "Charge Balance Error": cbe, "CBE Category": cbeCategory };
                });

                const masterSheetData = processedData.map(({isWellDup, isCoordDup, isMissing, ...row}) => {
                    let status = [];
                    if (isWellDup) status.push("Duplicate Well ID");
                    if (isCoordDup) status.push("Overlapping Coordinates");
                    if (isMissing) status.push("Incomplete Data");
                    return { "Validation Status": status.join(", ") || "Unique & Complete", ...row };
                });

                const completeChemData = [];
                const incompleteChemData = [];
                
                processedData.forEach((procRow, index) => {
                    const row = mergedData[index];
                    
                    const getMissingStrict = (keys) => keys.filter(k => {
                        const colName = config.mapping[k];
                        if (!colName) return false; // Ignore unmapped columns in strict checks
                        return isMissingValue(row[colName]); 
                    });
                    
                    const missingMajors = getMissingStrict(MAJOR_KEYS);
                    const missingTraces = getMissingStrict(TRACE_KEYS);
                    
                    const allMissing = [...missingMajors, ...missingTraces].map(k => MAPPING_LABELS[k] || k);
                    
                    let remarks = "All Required Parameters Available";
                    if (allMissing.length > 0) {
                        remarks = "Missing: " + allMissing.join(", ");
                    }

                    const missingIdentifiers = [];
                    if (isMissingValue(row[siteCol])) missingIdentifiers.push("Location Name");
                    if (isMissingValue(row[latCol]) || isNaN(parseFloat(row[latCol]))) missingIdentifiers.push("Latitude");
                    if (isMissingValue(row[lngCol]) || isNaN(parseFloat(row[lngCol]))) missingIdentifiers.push("Longitude");
                    if (isMissingValue(row[distCol])) missingIdentifiers.push("District Name");
                    if (isMissingValue(row[blockCol])) missingIdentifiers.push("Block Name");
                    if (isMissingValue(row[sourceCol])) missingIdentifiers.push("Source");

                    let identifierRemarks = "All Basic Details Present";
                    if (missingIdentifiers.length > 0) {
                        identifierRemarks = "Missing: " + missingIdentifiers.join(", ");
                    }
                    
                    const { isWellDup, isCoordDup, isMissing, ...exportRow } = procRow;
                    
                    const formattedRow = {
                        "Basic Location Details Remarks": identifierRemarks,
                        "Chemical Data Availability Remarks": remarks,
                        ...exportRow
                    };

                    if (allMissing.length === 0) {
                        completeChemData.push(formattedRow);
                    } else {
                        incompleteChemData.push(formattedRow);
                    }
                });

                // --- NEW LOGIC: Filter for Custom Selected Parameters Complete Data ---
                const customCompleteData = mergedData.filter(row => {
                    if (customCheckParams.length === 0) return false;
                    return customCheckParams.every(key => {
                        const col = config.mapping[key];
                        if (!col) return false; // Fails if the column isn't mapped
                        return !isMissingValue(row[col]);
                    });
                });

                const districtCounts = {};
                const blockCounts = {};
                
                mergedData.forEach(row => {
                    const state = String(row[stateCol] || "Unknown").trim();
                    const dist = String(row[distCol] || "Unknown").trim();
                    const block = String(row[blockCol] || "Unknown").trim();
                    
                    const distKey = `${state}|${dist}`;
                    const blockKey = `${state}|${dist}|${block}`;
                    
                    districtCounts[distKey] = (districtCounts[distKey] || 0) + 1;
                    blockCounts[blockKey] = (blockCounts[blockKey] || 0) + 1;
                });

                const distExportData = Object.keys(districtCounts).sort().map(k => {
                    const [st, dt] = k.split('|');
                    return { State: st, District: dt, "Samples Collected": districtCounts[k] };
                });
                const totalDistSamples = distExportData.reduce((acc, curr) => acc + curr["Samples Collected"], 0);
                distExportData.push({ State: "GRAND TOTAL", District: "—", "Samples Collected": totalDistSamples });

                const blockExportData = Object.keys(blockCounts).sort().map(k => {
                    const [st, dt, blk] = k.split('|');
                    return { State: st, District: dt, Block: blk, "Samples Collected": blockCounts[k] };
                });
                const totalBlockSamples = blockExportData.reduce((acc, curr) => acc + curr["Samples Collected"], 0);
                blockExportData.push({ State: "GRAND TOTAL", District: "—", Block: "—", "Samples Collected": totalBlockSamples });

                const stateSourceExportData = stateSourceSummary.tableData.map(row => {
                    const expRow = { "State / UT": row.state };
                    stateSourceSummary.sources.forEach(src => {
                        expRow[src] = row.counts[src] || 0;
                    });
                    expRow["Total Samples"] = row.total;
                    return expRow;
                });
                
                const ssTotalRow = { "State / UT": "GRAND TOTAL" };
                let ssGrandTotal = 0;
                stateSourceSummary.sources.forEach(src => {
                    const sum = stateSourceSummary.tableData.reduce((acc, row) => acc + (row.counts[src] || 0), 0);
                    ssTotalRow[src] = sum;
                    ssGrandTotal += sum;
                });
                ssTotalRow["Total Samples"] = ssGrandTotal;
                stateSourceExportData.push(ssTotalRow);

                appendFormattedSheet(masterSheetData, "Validation Sheet", false, true);
                
                // Add the new sheet for purely custom selected parameters
                if (customCompleteData.length > 0) {
                    appendFormattedSheet(customCompleteData, "Selected Params Complete", false, true);
                }
                
                if (completeChemData.length > 0) {
                    appendFormattedSheet(completeChemData, "Complete Chem Data", false, true);
                }
                if (incompleteChemData.length > 0) {
                    appendFormattedSheet(incompleteChemData, "Incomplete Chem Data", false, true);
                }
                
                appendFormattedSheet(processedData.filter(r => r.isWellDup), "Duplicate Well IDs", false, true);
                appendFormattedSheet(processedData.filter(r => r.isCoordDup), "Overlapping Coordinates", false, true);
                appendFormattedSheet(processedData.filter(r => r.isMissing), "Incomplete Records", false, true);
                
                appendFormattedSheet(distExportData, "District-wise Samples", true);
                appendFormattedSheet(blockExportData, "Block-wise Samples", true);
                appendFormattedSheet(stateSourceExportData, "State-Source Matrix", true);

                if (chemicalAuditData && chemicalAuditData.length > 0) {
                    const chemicalExport = chemicalAuditData.map(row => ({
                        "State / UT": row.state,
                        "Total Locations": row.total,
                        [`Locations with ${customCheckParams.length} Specific Params`]: row.completeSpecificChems,
                        "No. of Locations Missing With Basic Parameters": row.missingMajor,
                        "No. of Locations Missing with Metals": row.missingTrace,
                        "No. of Locations Missing Silica/Phosphate": row.missingOther,
                        "pH/CO3 Logic Errors": row.invalidPhCo3,
                        "TH != (Ca + Mg) meq/L": row.invalidThCaMg
                    }));

                    const tLocs = chemicalAuditData.reduce((acc, row) => acc + row.total, 0);
                    const tComplete = chemicalAuditData.reduce((acc, row) => acc + row.completeSpecificChems, 0);
                    const tMajor = chemicalAuditData.reduce((acc, row) => acc + row.missingMajor, 0);
                    const tTrace = chemicalAuditData.reduce((acc, row) => acc + row.missingTrace, 0);
                    const tOther = chemicalAuditData.reduce((acc, row) => acc + row.missingOther, 0);
                    const tPhCo3 = chemicalAuditData.reduce((acc, row) => acc + row.invalidPhCo3, 0);
                    const tThCaMg = chemicalAuditData.reduce((acc, row) => acc + row.invalidThCaMg, 0);

                    chemicalExport.push({
                        "State / UT": "GRAND TOTAL",
                        "Total Locations": tLocs,
                        [`Locations with ${customCheckParams.length} Specific Params`]: tComplete,
                        "No. of Locations Missing With Basic Parameters": tMajor,
                        "No. of Locations Missing with Metals": tTrace,
                        "No. of Locations Missing Silica/Phosphate": tOther,
                        "pH/CO3 Logic Errors": tPhCo3,
                        "TH != (Ca + Mg) meq/L": tThCaMg
                    });

                    appendFormattedSheet(chemicalExport, "Chemical Audit Matrix", true);

                    const missingChemExport = [];
                    chemicalAuditData.forEach(row => {
                        row.anomaliesTrace.forEach(ano => {
                            missingChemExport.push({
                                "State": row.state, "District": ano.dist, "Well ID": ano.id, "Location Name": ano.site,
                                "Anomaly Category": "Missing Data: Heavy Metals / Trace Elements", "Anomaly Details": ano.missingParams
                            });
                        });
                        row.anomaliesMajor.forEach(ano => {
                            missingChemExport.push({
                                "State": row.state, "District": ano.dist, "Well ID": ano.id, "Location Name": ano.site,
                                "Anomaly Category": "Missing Data: Basic Chemistry", "Anomaly Details": ano.missingParams
                            });
                        });
                        row.anomaliesOther.forEach(ano => {
                            missingChemExport.push({
                                "State": row.state, "District": ano.dist, "Well ID": ano.id, "Location Name": ano.site,
                                "Anomaly Category": "Missing Data: Silica & Phosphate", "Anomaly Details": ano.missingParams
                            });
                        });
                        row.anomaliesPhCo3.forEach(ano => {
                            missingChemExport.push({
                                "State": row.state, "District": ano.dist, "Well ID": ano.id, "Location Name": ano.site,
                                "Anomaly Category": "Logical Error: pH & CO3", "Anomaly Details": ano.details
                            });
                        });
                        row.anomaliesThCaMg.forEach(ano => {
                            missingChemExport.push({
                                "State": row.state, "District": ano.dist, "Well ID": ano.id, "Location Name": ano.site,
                                "Anomaly Category": "Logical Error: TH vs (Ca+Mg)", "Anomaly Details": ano.details
                            });
                        });
                    });

                    if (missingChemExport.length > 0) {
                        appendFormattedSheet(missingChemExport, "Chemical Anomalies", false, true);
                    }
                }

                if (blockAuditResults && blockAuditResults.length > 0) {
                    const auditExportData = [];
                    blockAuditResults.forEach(group => {
                        group.members.forEach(m => {
                            auditExportData.push({
                                "Anomaly Type": group.type,
                                "Group ID": group.id,
                                "Block Name": m.block,
                                "District": m.dist,
                                "State": m.state
                            });
                        });
                    });
                    appendFormattedSheet(auditExportData, "Block Name Audit", false, true);
                }
                
                if (boundaryProgress && boundaryProgress.results) {
                    const boundaryExport = [];
                    Object.entries(boundaryProgress.results.stateDetails).forEach(([st, data]) => {
                        data.anomalies.forEach(ano => {
                            boundaryExport.push({
                                "Reported State in Data": st,
                                "Well ID": ano.id,
                                "Location Name": ano.row ? ano.row[config.mapping.site] : "—",
                                "District Name": ano.row ? ano.row[config.mapping.district] : "—",
                                "Block Name": ano.row ? ano.row[config.mapping.block] : "—",
                                "Latitude": ano.row ? ano.row[config.mapping.lat] : "—",
                                "Longitude": ano.row ? ano.row[config.mapping.lng] : "—",
                                "Anomaly Type": ano.type,
                                "Actual Shapefile Location": ano.actual
                            });
                        });
                    });
                    if (boundaryExport.length > 0) {
                        appendFormattedSheet(boundaryExport, "Spatial Boundary Anomalies", false, true);
                    }
                }

                if (auditData.length > 0 && auditTotals) {
                    const auditSummaryExport = auditData.map(s => ({
                        "State / UT": s.name,
                        "Target Sampling Locations": s.samplesTarget,
                        "Actual Districts in State": s.actualDistricts,
                        "Districts covered in Dataset": s.datasetDistricts,
                        "Actual Blocks in State": s.actualBlocks,
                        "Blocks covered in Dataset": s.datasetBlocks,
                        "Total Locations in Dataset": s.locationsAvailable,
                        "Difference (+/-)": s.locationsAvailable - s.samplesTarget,
                        "Valid Well IDs": s.wellAvailable,
                        "Valid Latitudes": s.latAvailable,
                        "Valid Longitudes": s.lngAvailable,
                        "Missing Well ID": s.missingWellId,
                        "Missing Coordinates": s.missingCoords,
                        "Missing Location Name": s.missingLoc,
                        "Missing District": s.missingDist,
                        "Missing Block": s.missingBlock,
                        "Missing Gram Panchayat": s.missingGP,
                        "Missing Source": s.missingSource,
                        "Duplicate Well IDs": s.wellDups,
                        "Overlapping Coordinates": s.coordDups,
                        "Wrong State/UT": s.wrongState !== null ? s.wrongState : "N/A",
                        "Out of Boundary": s.outOfBounds !== null ? s.outOfBounds : "N/A",
                        [`Locations with ${customCheckParams.length} Specific Params`]: s.completeSpecificChems,
                        "Missing Basic Parameters": s.missingMajor,
                        "Missing Trace Metals": s.missingTrace,
                        "Missing Silica & Phosphate": s.missingOther,
                        "pH/CO3 Logic Errors": s.invalidPhCo3,
                        "TH != (Ca + Mg) meq/L": s.invalidThCaMg,
                        "Utilisation - Irrigation": s.utilIrrigation,
                        "Utilisation - Drinking": s.utilDrinking,
                        "Utilisation - Irrigation+Drinking": s.utilBoth,
                        "Utilisation - Others": s.utilOther,
                        "Utilisation - Missing": s.utilMissing,
                        "CBE Calculable Samples": s.cbeCalculable,
                        "CBE Upto ±5%": s.cbeWithin5,
                        "CBE > ±5% and Upto ±10%": s.cbe5To10,
                        "CBE > ±10%": s.cbeAbove10,
                        "Springs Detected": s.springs,
                        "Achievement %": s.achievement
                    }));

                    auditSummaryExport.push({
                        "State / UT": "GRAND TOTAL",
                        "Target Sampling Locations": auditTotals.samplesTarget,
                        "Actual Districts in State": auditTotals.actualDistricts,
                        "Districts covered in Dataset": auditTotals.datasetDistricts,
                        "Actual Blocks in State": auditTotals.actualBlocks,
                        "Blocks covered in Dataset": auditTotals.datasetBlocks,
                        "Total Locations in Dataset": auditTotals.locationsAvailable,
                        "Difference (+/-)": auditTotals.difference > 0 ? `+${auditTotals.difference}` : auditTotals.difference,
                        "Valid Well IDs": "—",
                        "Valid Latitudes": "—",
                        "Valid Longitudes": "—",
                        "Missing Well ID": auditTotals.missingWellId,
                        "Missing Coordinates": auditTotals.missingCoords,
                        "Missing Location Name": auditTotals.missingLoc,
                        "Missing District": auditTotals.missingDist,
                        "Missing Block": auditTotals.missingBlock,
                        "Missing Gram Panchayat": auditTotals.missingGP,
                        "Missing Source": auditTotals.missingSource,
                        "Duplicate Well IDs": auditTotals.wellDups,
                        "Overlapping Coordinates": auditTotals.coordDups,
                        "Wrong State/UT": auditTotals.hasBoundaryData ? auditTotals.wrongState : "N/A",
                        "Out of Boundary": auditTotals.hasBoundaryData ? auditTotals.outOfBounds : "N/A",
                        [`Locations with ${customCheckParams.length} Specific Params`]: auditTotals.completeSpecificChems,
                        "Missing Basic Parameters": auditTotals.missingMajor,
                        "Missing Trace Metals": auditTotals.missingTrace,
                        "Missing Silica & Phosphate": auditTotals.missingOther,
                        "pH/CO3 Logic Errors": auditTotals.invalidPhCo3,
                        "TH != (Ca + Mg) meq/L": auditTotals.invalidThCaMg,
                        "Utilisation - Irrigation": auditTotals.utilIrrigation,
                        "Utilisation - Drinking": auditTotals.utilDrinking,
                        "Utilisation - Irrigation+Drinking": auditTotals.utilBoth,
                        "Utilisation - Others": auditTotals.utilOther,
                        "Utilisation - Missing": auditTotals.utilMissing,
                        "CBE Calculable Samples": auditTotals.cbeCalculable,
                        "CBE Upto ±5%": auditTotals.cbeWithin5,
                        "CBE > ±5% and Upto ±10%": auditTotals.cbe5To10,
                        "CBE > ±10%": auditTotals.cbeAbove10,
                        "Springs Detected": auditTotals.springs,
                        "Achievement %": auditTotals.achievement + "%"
                    });

                    appendFormattedSheet(auditSummaryExport, "State Matrix Summary", true);
                }

                XLSX.writeFile(wb, `Well_Audit_Final_${Date.now()}.xlsx`);
            };

            return (
                <div className="min-h-screen pb-12 flex flex-col items-center relative">
                    
                    {/* Global Alert Modal */}
                    {globalAlert && (
                        <div className="fixed inset-0 z-[99999] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 animate-in">
                            <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full text-center">
                                <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">
                                    <i className="ph ph-warning-circle"></i>
                                </div>
                                <h3 className="text-lg font-black text-slate-800 mb-2">Notice</h3>
                                <p className="text-sm text-slate-600 mb-6">{globalAlert}</p>
                                <button onClick={() => setGlobalAlert(null)} className="w-full py-3 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition-colors">Dismiss</button>
                            </div>
                        </div>
                    )}

                    {/* Processing Overlay */}
                    {isProcessing && (
                        <div className="fixed inset-0 z-[9999] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center">
                            <div className="bg-white p-6 rounded-2xl shadow-2xl flex flex-col items-center gap-4">
                                <div className="w-10 h-10 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div>
                                <p className="text-sm font-black text-slate-700 uppercase tracking-widest">Processing Data...</p>
                            </div>
                        </div>
                    )}
                    
                    {/* Shapefile Alias Modal */}
                    {showAliasModal && (
                        <div className="fixed inset-0 z-[3000] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 animate-in">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-4 bg-slate-50 border-b flex justify-between items-center shrink-0">
                                    <h2 className="font-black text-slate-800 flex items-center gap-2"><i className="ph ph-pencil-simple text-blue-600"></i> Map Shapefile State Names</h2>
                                    <button onClick={() => setShowAliasModal(false)} className="p-2 hover:bg-slate-200 rounded-full"><i className="ph ph-x"></i></button>
                                </div>
                                <div className="p-6 overflow-y-auto custom-scrollbar flex-1 bg-slate-50/50">
                                    <p className="text-xs text-slate-500 mb-6">If your shapefile uses abbreviations (e.g., "LD") but your data uses full names (e.g., "Lakshadweep"), map them here to fix boundary audit mismatches.</p>
                                    <div className="space-y-3">
                                        {shapefileStates.map(state => (
                                            <div key={state} className="flex items-center gap-4 bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                                                <div className="w-1/2 font-bold text-slate-700 text-sm truncate" title={state}>{state}</div>
                                                <div className="w-8 flex justify-center text-slate-300"><i className="ph ph-arrow-right"></i></div>
                                                <div className="w-1/2">
                                                    <input 
                                                        type="text" 
                                                        placeholder="Alias (leave blank to keep original)" 
                                                        defaultValue={shapefileAliases[state] || ""}
                                                        onBlur={(e) => {
                                                            const val = e.target.value.trim();
                                                            setShapefileAliases(prev => ({...prev, [state]: val || undefined}));
                                                        }}
                                                        className="w-full p-2 border border-slate-200 rounded-lg text-xs focus:ring-2 focus:ring-blue-500 outline-none"
                                                    />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 border-t flex justify-end gap-3 shrink-0">
                                    <button onClick={() => setShowAliasModal(false)} className="px-6 py-2 bg-blue-600 text-white font-bold rounded-xl shadow-lg">Done & Apply</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Custom Parameter Config Modal */}
                    {showCustomParamModal && (
                        <div className="fixed inset-0 z-[4000] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 animate-in">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-4 bg-slate-50 border-b flex justify-between items-center shrink-0">
                                    <h2 className="font-black text-slate-800 flex items-center gap-2"><i className="ph ph-list-checks text-blue-600"></i> Configure Custom Completeness Check</h2>
                                    <button onClick={() => setShowCustomParamModal(false)} className="p-2 hover:bg-slate-200 rounded-full"><i className="ph ph-x"></i></button>
                                </div>
                                <div className="p-6 overflow-y-auto custom-scrollbar flex-1 bg-slate-50/50">
                                    <p className="text-xs text-slate-500 mb-4">Select the parameters that must ALL be present for a location to be counted in the "Params Complete" column.</p>
                                    
                                    <div className="flex justify-end gap-2 mb-4">
                                        <button onClick={() => setTempCustomParams([...CBE_KEYS, ...OTHER_CHEM_KEYS, ...TRACE_KEYS])} className="px-3 py-1.5 bg-slate-100 text-slate-600 text-[10px] font-bold rounded-lg hover:bg-slate-200 transition-colors shadow-sm border border-slate-200">Select All</button>
                                        <button onClick={() => setTempCustomParams([])} className="px-3 py-1.5 bg-slate-100 text-slate-600 text-[10px] font-bold rounded-lg hover:bg-slate-200 transition-colors shadow-sm border border-slate-200">Clear All</button>
                                    </div>

                                    <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
                                        {[...CBE_KEYS, ...OTHER_CHEM_KEYS, ...TRACE_KEYS].map(key => (
                                            <label key={key} className={`flex items-center gap-2 p-2.5 rounded-xl border cursor-pointer transition-colors shadow-sm ${tempCustomParams.includes(key) ? 'bg-blue-50 border-blue-300' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                                                <input 
                                                    type="checkbox" 
                                                    checked={tempCustomParams.includes(key)}
                                                    onChange={(e) => {
                                                        if (e.target.checked) setTempCustomParams([...tempCustomParams, key]);
                                                        else setTempCustomParams(tempCustomParams.filter(k => k !== key));
                                                    }}
                                                    className="w-4 h-4 text-blue-600 rounded focus:ring-blue-500 border-slate-300"
                                                />
                                                <span className="text-[11px] font-bold text-slate-700">{MAPPING_LABELS[key] || key}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 border-t flex justify-end gap-3 shrink-0">
                                    <button onClick={() => setShowCustomParamModal(false)} className="px-4 py-2 font-bold text-slate-400 hover:bg-slate-200 rounded-xl transition-colors">Cancel</button>
                                    <button onClick={() => { setCustomCheckParams(tempCustomParams); setShowCustomParamModal(false); }} className="px-6 py-2 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition-colors">Apply Selection</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="w-full header-gradient text-white shadow-2xl z-50 animate-in">
                        <div className="max-w-[98%] mx-auto py-4 px-6 flex flex-col xl:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg transform -rotate-3 hover:rotate-0 transition-transform cursor-pointer">
                                    <i className="ph ph-wave-sine text-2xl text-white"></i>
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black tracking-tighter flex items-center gap-2">
                                        भूजल गुणवत्ता (GWQ) स्थिर कुओं का  <span className="text-blue-400">डेटा प्रमाणीकरण</span>
                                    </h1>
                                    <div className="flex items-center gap-2">
                                        <span className="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">डिज़ाइन एवं विकास:जितेन्द्र कुमार, वरिष्ठ तकनीकी सहायक (रसायन)</p>
                                    </div>
                                </div>
                            </div>

                            <div className="flex items-center gap-3 bg-white/5 backdrop-blur-md p-1.5 rounded-3xl border border-white/10 shadow-inner">
                                <div className="px-6 py-2 rounded-2xl">
                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-0.5 text-center">Total Records</div>
                                    <div className="text-xl font-black text-white text-center">{auditSummary.total.toLocaleString()}</div>
                                </div>
                                <div className="w-px h-10 bg-white/10"></div>
                                <div className="px-6 py-2 rounded-2xl">
                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-0.5 text-center">Duplicates</div>
                                    <div className={`text-xl font-black text-center ${auditSummary.wellDups + auditSummary.coordDups > 0 ? 'text-pink-400' : 'text-slate-400'}`}>
                                        {auditSummary.wellDups + auditSummary.coordDups}
                                    </div>
                                </div>
                                <div className="w-px h-10 bg-white/10"></div>
                                <div className="px-6 py-2 rounded-2xl">
                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-0.5 text-center">Incomplete</div>
                                    <div className={`text-xl font-black text-center ${auditSummary.incomplete > 0 ? 'text-amber-400' : 'text-slate-400'}`}>
                                        {auditSummary.incomplete}
                                    </div>
                                </div>
                            </div>

                            <div className="flex items-center gap-3">
                                <button onClick={() => { setIsUploadMapping(false); setDetectedHeaders(config.headers); setTempHeadersText(config.headers.join(", ")); setTempMapping(config.mapping); setShowSettings(true); }} className="w-12 h-12 flex items-center justify-center bg-white/10 rounded-2xl hover:bg-white/20 transition-all border border-white/10">
                                    <i className="ph ph-sliders text-xl"></i>
                                </button>
                                <button 
                                    onClick={handleExport} 
                                    disabled={mergedData.length === 0} 
                                    className="px-6 py-3 bg-white text-slate-900 font-black rounded-2xl hover:bg-blue-50 transition-all shadow-xl flex items-center gap-2 disabled:bg-slate-700 disabled:text-slate-500"
                                >
                                    <i className="ph ph-paper-plane-tilt text-lg"></i>
                                    Export Results
                                </button>
                            </div>
                        </div>
                    </header>

                    {showSettings && (
                        <div className="fixed inset-0 z-[2000] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-4 bg-slate-50 border-b flex justify-between items-center shrink-0">
                                    <h2 className="font-black text-slate-800">{isUploadMapping ? "Map Uploaded File Columns" : "GUI Header Configuration"}</h2>
                                    <button onClick={() => { setShowSettings(false); setPendingFiles([]); }} className="p-2 hover:bg-slate-200 rounded-full"><i className="ph ph-x"></i></button>
                                </div>
                                <div className="p-6 space-y-4 overflow-y-auto custom-scrollbar">
                                    {isUploadMapping && (

                                                                                                <th className="p-3 border-b border-slate-700 w-48">Well ID</th>

                                                                                    </table>

                                                                        </div>
                                                                    </td>
                                                                </tr>

                                                    const tComplete = chemicalAuditData.reduce((acc, row) => acc + row.completeSpecificChems, 0);
                                                    const tMajor = chemicalAuditData.reduce((acc, row) => acc + row.missingMajor, 0);
                                                    const tTrace = chemicalAuditData.reduce((acc, row) => acc + row.missingTrace, 0);
                                                    const tOther = chemicalAuditData.reduce((acc, row) => acc + row.missingOther, 0);
                                                    const tPhCo3 = chemicalAuditData.reduce((acc, row) => acc + row.invalidPhCo3, 0);
                                                    const tThCaMg = chemicalAuditData.reduce((acc, row) => acc + row.invalidThCaMg, 0);

                                                    return (
                                                        <tr className="bg-slate-800 text-white font-black hover:bg-slate-700 transition-colors sticky bottom-0">
                                                            <td className="p-4 border-r border-slate-700 text-center text-slate-400">—</td>
                                                            <td className="p-4 border-r border-slate-700">GRAND TOTAL</td>

                                                            <td className="p-4 border-r border-slate-700 text-center text-blue-400">{tComplete}</td>
                                                            <td className="p-4 border-r border-slate-700 text-center text-amber-300">
                                                                {tMajor} {tLocs > 0 && tMajor > 0 && <span className="text-[10px] font-medium text-amber-300/70 ml-1">({((tMajor / tLocs) * 100).toFixed(1)}%)</span>}

                                                            <td className="p-4 border-r border-slate-700 text-center text-purple-300">
                                                                {tTrace} {tLocs > 0 && tTrace > 0 && <span className="text-[10px] font-medium text-purple-300/70 ml-1">({((tTrace / tLocs) * 100).toFixed(1)}%)</span>}
                                                            </td>
                                                            <td className="p-4 border-r border-slate-700 text-center text-cyan-300">
                                                                {tOther} {tLocs > 0 && tOther > 0 && <span className="text-[10px] font-medium text-cyan-300/70 ml-1">({((tOther / tLocs) * 100).toFixed(1)}%)</span>}
                                                            </td>
                                                            <td className="p-4 border-r border-slate-700 text-center text-rose-300">{tPhCo3}</td>
                                                            <td className="p-4 border-r border-slate-700 text-center text-orange-300">{tThCaMg}</td>
                                                            <td className="p-4 text-center text-slate-400">—</td>
                                                        </tr>
                                                    );
                                                })()}
                                            </tbody>
                                        </table>
                                    </div>

                                {/* BLOCK NAME AUDIT */}
                                {activeTab === 'block_audit' && (
                                    <div className="p-8 overflow-auto custom-scrollbar max-h-[650px] bg-slate-50 relative">

                                                Block Nomenclature Intelligence
                                            </h3>

                                            <div className="flex flex-col items-center justify-center p-16 text-center bg-white border border-slate-200 rounded-3xl shadow-sm">

                                                    <i className="ph ph-check-circle"></i>
                                                </div>

                                                        <div className={`absolute top-0 left-0 w-2 h-full ${
                                                            group.type.includes('Fuzzy') ? 'bg-amber-400' :
                                                            group.type.includes('Formatting') ? 'bg-blue-400' : 'bg-pink-400'

                                                            <div>
                                                                <h4 className="font-black text-slate-800 text-lg flex items-center gap-2 mb-1">

                                                                    {group.type.includes('Formatting') && <i className="ph ph-text-aa text-blue-500"></i>}

                                                            </div>

                                                                        {m.block}

                                                                    <div className="flex items-center gap-2 text-[10px] font-black uppercase tracking-wider text-slate-500 mt-2">

                                                                    </div>
                                                                    <div className="flex items-center gap-2 text-[10px] font-black uppercase tracking-wider text-blue-600 bg-blue-50 px-2 py-1 rounded-md w-max">
                                                                        <i className="ph ph-globe-hemisphere-west"></i>
                                                                        <span>{m.state}</span>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {activeTab === 'boundary_audit' && (
                                    <div className="p-8 overflow-auto custom-scrollbar max-h-[650px] bg-slate-50 relative">
                                        <div className="mb-8 max-w-4xl flex justify-between items-start">
                                            <div>

                                                    Map Shapefile States

                                                </div>
                                                <p className="mt-3 text-sm font-black text-blue-600">{boundaryProgress.percent}% Complete</p>

                                                            <h4 className="text-3xl font-black text-red-600">{boundaryProgress.results.outOfBounds.toLocaleString()}</h4>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-sm">

                                                        <tbody className="divide-y divide-slate-100">
                                                            {Object.entries(boundaryProgress.results.stateDetails)
                                                                .sort((a,b) => (b[1].wrongState + b[1].outOfBounds) - (a[1].wrongState + a[1].outOfBounds))
                                                                .map(([stateName, details]) => {
                                                                    const hasAnomalies = details.wrongState > 0 || details.outOfBounds > 0;
                                                                    const isExpanded = expandedAnomalyState === stateName;
                                                                    
                                                                    return (
                                                                        <React.Fragment key={stateName}>
                                                                            <tr className="hover:bg-slate-50 transition-colors">

                                                                                <td className={`p-4 text-center font-black border-r border-slate-100 ${details.wrongState > 0 ? 'bg-amber-50 text-amber-600' : 'text-slate-300'}`}>{details.wrongState.toLocaleString()}</td>
                                                                                <td className={`p-4 text-center font-black border-r border-slate-100 ${details.outOfBounds > 0 ? 'bg-red-50 text-red-600' : 'text-slate-300'}`}>{details.outOfBounds.toLocaleString()}</td>
                                                                                <td className="p-3 text-center">
                                                                                    {hasAnomalies ? (

                                                                                            {isExpanded ? 'Hide' : 'View IDs'}
                                                                                        </button>

                                                                                        <span className="text-slate-300 text-[10px] font-bold uppercase"><i className="ph ph-check"></i> Clean</span>

                                                                                    <td colSpan="6" className="bg-slate-900 p-0 border-b-4 border-slate-200">

                                                                                            <div className="flex justify-between items-center mb-4">
                                                                                                <h5 className="text-[10px] text-slate-400 font-black uppercase tracking-widest">Anomaly Ledger: {stateName}</h5>
                                                                                                <span className="text-[9px] font-bold text-slate-400 bg-slate-800 px-3 py-1 rounded-full">{details.anomalies.length} Records</span>
                                                                                            </div>
                                                                                            <table className="w-full text-left text-[10px] border-collapse bg-slate-800 rounded-xl overflow-hidden shadow-inner">
                                                                                                <thead className="bg-slate-950 text-slate-400 uppercase tracking-widest">
                                                                                                    <tr>
                                                                                                        <th className="p-3 border-b border-slate-700">Well ID</th>
                                                                                                        <th className="p-3 border-b border-slate-700">Location</th>
                                                                                                        <th className="p-3 border-b border-slate-700">District</th>
                                                                                                        <th className="p-3 border-b border-slate-700">Block</th>
                                                                                                        <th className="p-3 border-b border-slate-700">Coordinates</th>
                                                                                                        <th className="p-3 border-b border-slate-700">Anomaly Type</th>
                                                                                                        <th className="p-3 border-b border-slate-700">Detected In</th>
                                                                                                    </tr>
                                                                                                </thead>
                                                                                                <tbody className="divide-y divide-slate-700 text-slate-200">
                                                                                                    {details.anomalies.map((ano, idx) => (
