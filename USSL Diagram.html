                            const stateStr = stateHeader ? d[stateHeader] : (d.State || d.STATE);
                            marker.bindPopup(`
                                <div class="text-xs font-sans text-slate-800 p-1">
                                    <div class="font-black border-b border-slate-200 pb-1 mb-2 text-sm">${d._calc.locName}</div>
                                    <div class="space-y-1">
                                        <div class="flex justify-between gap-4"><span class="text-slate-500">USSL:</span> <b>${d._calc.ussl}</b></div>
                                        <div class="flex justify-between gap-4"><span class="text-slate-500">Facies:</span> <b>${displayFacies}</b></div>
                                        ${stateStr ? `<div class="flex justify-between gap-4"><span class="text-slate-500">State:</span> <b>${stateStr}</b></div>` : ''}
                                    </div>
                                </div>
                            `);
                            marker.addTo(markersLayer.current);
                        }
                    });

                    if (bounds.length > 0) {
                        setTimeout(() => { if (mapInstance.current) { try { mapInstance.current.fitBounds(bounds, { padding: [30, 30], maxZoom: 12 }); } catch(e) {} } }, 300);
                    }
                }
            }, [validData, viewMode, colorBy, usslColors, faciesColors, stateColors, usslSizes, faciesSizes, stateSizes, stateHeader, faciesNames]);

            const exportExcel = async () => {
                const workbook = new ExcelJS.Workbook();
                const ws = workbook.addWorksheet('Valid Data Report');
                
                const ions = ['Ca', 'Mg', 'Na', 'K', 'Cl', 'SO4', 'HCO3', 'CO3'];
                const additionalCols = [
                    {header:'SAR', key:'sar'}, 
                    {header:'USSL', key:'ussl'}, 
                    {header:'Facies', key:'facies'},
                    ...ions.map(ion => ({ header: `${ion} (meq/l)`, key: `meq_${ion}` })),
                    ...ions.map(ion => ({ header: `${ion} (% meq)`, key: `meqPerc_${ion}` }))
                ];

                ws.columns = [{header:'SL', key:'sl'}, ...originalHeaders.map(h=>({header:h, key:h})), ...additionalCols];
                
                validData.forEach(item => {
                    const rowObj = { sl: item._calc.sl };
                    
                    // Convert raw string data to actual numbers when possible
                    originalHeaders.forEach(h => {
                        const val = item[h];
                        if (typeof val === 'string' && val.trim() !== '' && !isNaN(Number(val))) {
                            rowObj[h] = Number(val);
                        } else {
                            rowObj[h] = val;
                        }
                    });

                    rowObj.sar = Number(item._calc.sar.toFixed(2));
                    rowObj.ussl = item._calc.ussl;
                    rowObj.facies = faciesNames[item._calc.facies] || item._calc.facies;
                    
                    // Populate meq and meq% data into the row
                    ions.forEach(ion => {
                        rowObj[`meq_${ion}`] = item._calc.meq[ion] ? Number(item._calc.meq[ion].toFixed(4)) : 0;
                        rowObj[`meqPerc_${ion}`] = item._calc.meqPerc[ion] ? Number(item._calc.meqPerc[ion].toFixed(2)) : 0;
                    });
                    
                    ws.addRow(rowObj);
                });
                
                const usslCols = stats.ussl.flatMap(s => [ { header: `${s.name} (Count)`, key: `${s.key}_count`, width: 15 }, { header: `${s.name} (%)`, key: `${s.key}_perc`, width: 10 } ]);
                const faciesCols = stats.facies.flatMap(s => [ { header: `${s.name} (Count)`, key: `${s.key}_count`, width: 35 }, { header: `${s.name} (%)`, key: `${s.key}_perc`, width: 10 } ]);

                const safeString = (val) => String(val || '');

                const generateTotalRow = (data, categoryStats, level) => {
                    const totalObj = {};
                    if (level === 'state') totalObj.Name = 'GRAND TOTAL';
                    else totalObj.State = 'GRAND TOTAL';
                    
                    const grandTotal = data.reduce((sum, row) => sum + (row.Total || 0), 0);
                    totalObj.Total = grandTotal;

                    categoryStats.forEach(s => {
                        const countSum = data.reduce((sum, row) => sum + (row[`${s.key}_count`] || 0), 0);
                        totalObj[`${s.key}_count`] = countSum;
                        totalObj[`${s.key}_perc`] = grandTotal ? Number(((countSum / grandTotal) * 100).toFixed(1)) : 0;
                    });
                    return totalObj;
                };

                if (analytics.state && analytics.state.length > 0) {
                    const sortedState = [...analytics.state].sort((a, b) => safeString(a.Name).localeCompare(safeString(b.Name)));
                    const stateColsBase = [ { header: 'State Name', key: 'Name', width: 25 }, { header: 'Valid Samples', key: 'Total', width: 15 } ];
                    
                    const stateUsslWs = workbook.addWorksheet('State Matrix - USSL'); stateUsslWs.columns = [...stateColsBase, ...usslCols]; 
                    sortedState.forEach(item => stateUsslWs.addRow(item));
                    stateUsslWs.addRow(generateTotalRow(sortedState, stats.ussl, 'state'));
                    
                    const stateFaciesWs = workbook.addWorksheet('State Matrix - Facies'); stateFaciesWs.columns = [...stateColsBase, ...faciesCols]; 
                    sortedState.forEach(item => stateFaciesWs.addRow(item));
                    stateFaciesWs.addRow(generateTotalRow(sortedState, stats.facies, 'state'));
                }

                if (analytics.district && analytics.district.length > 0) {
                    const sortedDistrict = [...analytics.district].sort((a, b) => {
                        const cmp1 = safeString(a.State).localeCompare(safeString(b.State));
                        return cmp1 !== 0 ? cmp1 : safeString(a.Name).localeCompare(safeString(b.Name));
                    });
                    const distColsBase = [ { header: 'State Name', key: 'State', width: 20 }, { header: 'District Name', key: 'Name', width: 25 }, { header: 'Valid Samples', key: 'Total', width: 15 } ];
                    
                    const distUsslWs = workbook.addWorksheet('District Matrix - USSL'); distUsslWs.columns = [...distColsBase, ...usslCols]; 
                    sortedDistrict.forEach(item => distUsslWs.addRow(item));
                    distUsslWs.addRow(generateTotalRow(sortedDistrict, stats.ussl, 'district'));
                    
                    const distFaciesWs = workbook.addWorksheet('District Matrix - Facies'); distFaciesWs.columns = [...distColsBase, ...faciesCols]; 
                    sortedDistrict.forEach(item => distFaciesWs.addRow(item));
                    distFaciesWs.addRow(generateTotalRow(sortedDistrict, stats.facies, 'district'));
                }
                
                if (analytics.block && analytics.block.length > 0) {
                    const sortedBlock = [...analytics.block].sort((a, b) => {
                        const cmp1 = safeString(a.State).localeCompare(safeString(b.State));
                        if (cmp1 !== 0) return cmp1;
                        const cmp2 = safeString(a.District).localeCompare(safeString(b.District));
                        return cmp2 !== 0 ? cmp2 : safeString(a.Name).localeCompare(safeString(b.Name));
                    });
                    const blockColsBase = [ { header: 'State Name', key: 'State', width: 20 }, { header: 'District Name', key: 'District', width: 20 }, { header: 'Block Name', key: 'Name', width: 25 }, { header: 'Valid Samples', key: 'Total', width: 15 } ];
                    
                    const blockUsslWs = workbook.addWorksheet('Block Matrix - USSL'); blockUsslWs.columns = [...blockColsBase, ...usslCols]; 
                    sortedBlock.forEach(item => blockUsslWs.addRow(item));
                    blockUsslWs.addRow(generateTotalRow(sortedBlock, stats.ussl, 'block'));
                    
                    const blockFaciesWs = workbook.addWorksheet('Block Matrix - Facies'); blockFaciesWs.columns = [...blockColsBase, ...faciesCols]; 
                    sortedBlock.forEach(item => blockFaciesWs.addRow(item));
                    blockFaciesWs.addRow(generateTotalRow(sortedBlock, stats.facies, 'block'));
                }

                // Apply specific formatting to all worksheets
                workbook.worksheets.forEach(sheet => {
                    // Auto-adjust column widths based on content
                    sheet.columns.forEach(column => {
                        let maxLength = 0;
                        column.eachCell({ includeEmpty: true }, cell => {
                            const columnLength = cell.value ? cell.value.toString().length : 10;
                            if (columnLength > maxLength) {
                                maxLength = columnLength;
                            }
                        });
                        // Add some padding and cap the width
                        column.width = Math.min(maxLength + 3, 60);
                    });

                    // Apply styles to rows and cells
                    sheet.eachRow((row, rowNumber) => {
                        const firstCellVal = row.getCell(1).value;
                        const isTotalRow = firstCellVal === 'GRAND TOTAL';

                        row.eachCell((cell) => {
                            if (rowNumber === 1) {
                                // Header Row Formatting
                                cell.font = { name: 'Times New Roman', size: 12, bold: true, color: { argb: 'FFFFFFFF' } };
                                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF000000' } };
                                cell.alignment = { vertical: 'middle', horizontal: 'center', wrapText: true };
                            } else if (isTotalRow) {
                                // Grand Total Formatting
                                cell.font = { name: 'Times New Roman', size: 12, bold: true };
                                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE2E8F0' } }; // Light gray background
                                cell.alignment = { vertical: 'middle', wrapText: true };
                            } else {
                                // Data Row Formatting
                                cell.font = { name: 'Times New Roman', size: 12 };
                                cell.alignment = { vertical: 'middle', wrapText: true };
                            }
                            
                            // Add borders for a cleaner look
                            cell.border = {
                                top: { style: 'thin' },
                                left: { style: 'thin' },
                                bottom: { style: 'thin' },
                                right: { style: 'thin' }
                            };
                        });
                    });
                });

                const buf = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `WQ_Report_Filtered.xlsx`; link.click();
            };

            const FilterDropdown = ({ label }) => {
                const options = getOptions(label);
                const isAllSelected = activeFilters[label] === 'All';

                return (
                    <div className="flex flex-col gap-1.5 flex-1 min-w-[150px] animate-fade-in">
                        <label className="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1 flex justify-between">
                            <span>{label}</span>
                            {!isAllSelected && <span className="text-blue-500 lowercase font-normal italic">Selected</span>}
                        </label>
                        <select 
                            className={`border rounded-xl px-3 py-2.5 text-[11px] font-bold transition-all cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500/50 ${
                                isAllSelected 
                                    ? 'bg-white border-slate-200 text-slate-900 shadow-sm' 
                                    : 'bg-blue-50 border-blue-300 text-blue-700 shadow-sm'
                            }`}
                            value={activeFilters[label]}
                            onChange={(e) => handleFilterChange(label, e.target.value)}
                        >
                            {options.map(opt => <option key={opt} value={opt} className="bg-white text-slate-900">{opt}</option>)}
                        </select>
                    </div>
                );
            };

            const handleUsslColorChange = (key, newColor) => setUsslColors(prev => ({ ...prev, [key]: newColor }));
            const handleUsslSizeChange = (key, newSize) => setUsslSizes(prev => ({ ...prev, [key]: newSize }));
            const handleFaciesColorChange = (key, newColor) => setFaciesColors(prev => ({ ...prev, [key]: newColor }));
            const handleFaciesSizeChange = (key, newSize) => setFaciesSizes(prev => ({ ...prev, [key]: newSize }));
            const handleFaciesNameChange = (key, newName) => setFaciesNames(prev => ({ ...prev, [key]: newName }));
            const handleStateColorChange = (key, newColor) => setStateColors(prev => ({ ...prev, [key]: newColor }));
            const handleStateSizeChange = (key, newSize) => setStateSizes(prev => ({ ...prev, [key]: newSize }));

            const hasCoordinates = useMemo(() => validData.some(d => d._calc.lat !== null && d._calc.lng !== null), [validData]);

            const getPointKey = React.useCallback((d) => {
                if (scatterColorBy === 'state' && stateHeader) return d[stateHeader] || 'Unknown';
                if (scatterColorBy === 'ussl') return d._calc.ussl;
                return d._calc.facies;
            }, [scatterColorBy, stateHeader]);

            const activeColors = scatterColorBy === 'state' ? stateColors : (scatterColorBy === 'ussl' ? usslColors : faciesColors);
            const activeSizes = scatterColorBy === 'state' ? stateSizes : (scatterColorBy === 'ussl' ? usslSizes : faciesSizes);
            
            const currentThemeData = APP_THEMES.find(t => t.id === activeThemeId) || APP_THEMES[0];

            return (
                <div className="p-4 md:p-6 w-full mx-auto space-y-6 relative">
                    
                    {/* --- Dynamic Mapping Modal --- */}
                    {showMappingModal && (
                        <div className="fixed inset-0 z-[9999] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-4xl w-full max-h-[90vh] flex flex-col overflow-hidden animate-fade-in">
                                <div className="px-6 py-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center shrink-0">
                                    <div>
                                        <h2 className="text-lg font-black text-slate-800 tracking-tight">Map Data Columns</h2>
                                        <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Align your Excel columns to the system parameters</p>
                                    </div>
                                    <button onClick={() => { setShowMappingModal(false); setPendingData(null); }} className="text-slate-400 hover:text-rose-500 transition-colors">
                                        <i className="ph ph-x-circle text-[28px]"></i>
                                    </button>
                                </div>
                                
                                <div className="overflow-y-auto custom-scrollbar flex-1 p-6 bg-white">
                                    {['Location', 'Chemistry', 'Metadata'].map(group => (
                                        <div key={group} className="mb-8 last:mb-0">
                                            <h3 className="text-xs font-black uppercase text-indigo-500 tracking-widest border-b border-slate-100 pb-2 mb-4">{group} Parameters</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                                {COLUMN_DEFINITIONS.filter(c => c.group === group).map(col => (
                                                    <div key={col.id} className="flex flex-col gap-1.5 p-3 rounded-xl border border-slate-100 bg-slate-50 hover:bg-indigo-50/30 transition-colors group">
                                                        <label className="text-[10px] font-bold text-slate-700">{col.label}</label>
                                                        <select 
                                                            value={columnMapping[col.id] || ""} 
                                                            onChange={(e) => setColumnMapping(prev => ({...prev, [col.id]: e.target.value}))}
                                                            className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-xs text-slate-700 bg-white focus:outline-none focus:ring-1 focus:ring-indigo-500 font-medium"
                                                        >
                                                            <option value="">-- Unmapped / Skip --</option>
                                                            {pendingHeaders.map(h => <option key={h} value={h}>{h}</option>)}
                                                        </select>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                
                                <div className="p-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-3 shrink-0">
                                    <button onClick={() => { setShowMappingModal(false); setPendingData(null); }} className="px-5 py-2.5 rounded-xl text-xs font-bold text-slate-600 hover:bg-slate-200 transition-colors">Cancel</button>
                                    <button onClick={confirmMapping} className="px-5 py-2.5 rounded-xl text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-500 shadow-md shadow-indigo-500/20 transition-all active:scale-95">Apply Mapping & Process Data</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {/* ----------------------------- */}

                    <header className={`bg-white p-4 md:p-5 rounded-[1.5rem] border border-slate-200 shadow-xl flex flex-col xl:flex-row justify-between items-center gap-4 transition-colors duration-300`}>
                        <div className="flex flex-col gap-1 text-center xl:text-left shrink-0">
                            <h1 className="text-2xl md:text-3xl font-black italic tracking-tighter uppercase leading-tight drop-shadow-sm">
                                <span className="text-blue-700">Hydrochemical Facies</span> 
                                <span className="text-slate-300 mx-2">&</span> 
                                <span className="text-rose-600">USSL Diagram</span>
                            </h1>
                        </div>
                        <div className="flex gap-3 items-center flex-wrap justify-center flex-1 xl:justify-end">
                            
                            {/* Colorful Theme Switcher Dropdown replacement */}
                            <div className="flex bg-slate-100 p-1 rounded-xl border border-slate-200 gap-1 shadow-inner hidden lg:flex">
                                {APP_THEMES.map(t => (
                                    <button 
                                        key={t.id}
                                        onClick={() => setActiveThemeId(t.id)} 
                                        className={`w-8 h-8 flex items-center justify-center rounded-lg transition-all shadow-sm border-b-[3px] active:border-b-0 active:translate-y-[3px] ${activeThemeId === t.id ? 'bg-slate-800 text-white border-slate-900' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}
                                        title={t.name}
                                    >
                                        <i className={`ph ${t.icon} text-base`}></i>
                                    </button>
                                ))}
                            </div>

                            {/* Vibrant Upload & Export 3D Buttons */}
                            <label className="bg-indigo-500 text-white px-4 py-2.5 rounded-xl font-black uppercase tracking-widest text-[10px] cursor-pointer transition-all duration-150 shadow-[0_3px_0_0_#3730a3] hover:bg-indigo-400 hover:-translate-y-px active:shadow-none active:translate-y-[3px]">
                                <div className="flex items-center gap-2"><i className="ph ph-upload-simple text-base"></i> Import Data</div>
                                <input type="file" className="hidden" onChange={handleFileUpload} />
                            </label>
                            {processedData.length > 0 && (
                                <button onClick={exportExcel} className="bg-teal-500 text-white px-4 py-2.5 rounded-xl font-black uppercase tracking-widest text-[10px] transition-all duration-150 shadow-[0_3px_0_0_#0f766e] hover:bg-teal-400 hover:-translate-y-px active:shadow-none active:translate-y-[3px]">
                                    <div className="flex items-center gap-2"><i className="ph ph-download-simple text-base"></i> Excel Export</div>
                                </button>
                            )}
                            
                            {/* Multi-Colored 3D Navigation Tabs */}
                            <div className="bg-slate-50 p-1.5 rounded-2xl flex gap-1.5 border border-slate-200 transition-colors duration-300 flex-wrap justify-center shadow-inner w-full lg:w-auto mt-2 xl:mt-0">
                                <button onClick={() => setViewMode('summary')} className={`px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all duration-150 border border-transparent ${viewMode === 'summary' ? 'bg-lime-600 text-white shadow-none translate-y-[3px]' : 'bg-lime-500 text-white shadow-[0_3px_0_0_#4d7c0f] hover:bg-lime-400 hover:-translate-y-px'}`}>Visuals</button>
                                <button onClick={() => setViewMode('analytics_ussl')} className={`px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all duration-150 border border-transparent ${viewMode === 'analytics_ussl' ? 'bg-blue-700 text-white shadow-none translate-y-[3px]' : 'bg-blue-500 text-white shadow-[0_3px_0_0_#1d4ed8] hover:bg-blue-400 hover:-translate-y-px'}`}>USSL Matrix</button>
                                <button onClick={() => setViewMode('analytics_facies')} className={`px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all duration-150 border border-transparent ${viewMode === 'analytics_facies' ? 'bg-red-700 text-white shadow-none translate-y-[3px]' : 'bg-red-500 text-white shadow-[0_3px_0_0_#b91c1c] hover:bg-red-400 hover:-translate-y-px'}`}>Facies Matrix</button>
                                <button onClick={() => setViewMode('completeness')} className={`px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all duration-150 border border-transparent ${viewMode === 'completeness' ? 'bg-orange-700 text-white shadow-none translate-y-[3px]' : 'bg-orange-500 text-white shadow-[0_3px_0_0_#c2410c] hover:bg-orange-400 hover:-translate-y-px'}`}>Data Quality</button>
                                <button onClick={() => setViewMode('table')} className={`px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all duration-150 border border-transparent ${viewMode === 'table' ? 'bg-yellow-500 text-yellow-950 shadow-none translate-y-[3px]' : 'bg-yellow-400 text-yellow-950 shadow-[0_3px_0_0_#a16207] hover:bg-yellow-300 hover:-translate-y-px'}`}>Table</button>
                                <button onClick={() => setViewMode('map')} className={`px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all duration-150 border border-transparent ${viewMode === 'map' ? 'bg-emerald-700 text-white shadow-none translate-y-[3px]' : 'bg-emerald-500 text-white shadow-[0_3px_0_0_#047857] hover:bg-emerald-400 hover:-translate-y-px'}`}>GIS Map</button>
                            </div>
                        </div>
                    </header>

                    {rawData.length > 0 && (
                        <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-lg transition-colors duration-300 w-full">
                            <div className="flex items-center gap-2 mb-4">
                                <div className="w-1.5 h-1.5 bg-indigo-500 rounded-full"></div>
                                <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Dynamic Cascading Filters</h4>
                            </div>
                            <div className="flex flex-wrap gap-4 items-end">
                                <FilterDropdown label="State" />
                                <FilterDropdown label="District" />
                                <FilterDropdown label="Block" />
                                <FilterDropdown label="Source" />
                                <FilterDropdown label="Season" />
                                <button 
                                    onClick={() => setActiveFilters({State: 'All', District: 'All', Block: 'All', Source: 'All', Season: 'All'})}
                                    className="px-4 py-3 text-[9px] font-black uppercase transition-all rounded-xl border-b-4 active:border-b-0 active:translate-y-1 bg-white border-rose-200 text-rose-500 hover:bg-rose-50"
                                >
                                    Clear Filters
                                </button>
                            </div>
                        </div>
                    )}

                    {}
                    {rawData.length === 0 && (
                        <div className="bg-indigo-50 border border-indigo-200 text-indigo-700 px-6 py-4 rounded-[2rem] flex items-center gap-4 shadow-sm w-full transition-all animate-fade-in">
                            <i className="ph ph-info text-3xl animate-pulse"></i>
                            <div className="flex flex-col">
                                <span className="text-sm font-black uppercase tracking-widest">No Data Loaded</span>
                                <span className="text-xs font-bold opacity-80">Import an Excel file to populate the charts and analytics. The diagrams below are currently showing empty templates.</span>
                            </div>
                        </div>
                    )}

                    {viewMode === 'summary' ? (
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 animate-in fade-in duration-500 w-full">
                            <div className="lg:col-span-8 flex flex-col gap-8">
                                <div className="flex items-center gap-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-200 -mb-4">
                                        <span className="text-[10px] font-black uppercase text-slate-500 tracking-widest flex items-center gap-2"><i className="ph ph-palette text-blue-500"></i> Scatter Color By:</span>
                                        <div className="flex bg-slate-100 p-1 rounded-2xl border border-slate-200 gap-1">
                                            <button onClick={() => setScatterColorBy('facies')} className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all border-b-4 active:border-b-0 active:translate-y-1 ${scatterColorBy === 'facies' ? 'bg-emerald-500 text-white border-emerald-700 shadow-sm' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>Hydro Facies</button>
                                            <button onClick={() => setScatterColorBy('ussl')} className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all border-b-4 active:border-b-0 active:translate-y-1 ${scatterColorBy === 'ussl' ? 'bg-blue-500 text-white border-blue-700 shadow-sm' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>USSL Class</button>
                                            {stateHeader && <button onClick={() => setScatterColorBy('state')} className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all border-b-4 active:border-b-0 active:translate-y-1 ${scatterColorBy === 'state' ? 'bg-fuchsia-500 text-white border-fuchsia-700 shadow-sm' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>State</button>}
                                        </div>
                                        <div className="ml-auto text-[10px] font-bold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-xl border border-emerald-200 shadow-sm italic hidden md:block">Showing {validData.length} Valid Samples</div>
                                    </div>
                                    
                                    <PiperPlot data={validData} faciesColors={faciesColors} pointColors={activeColors} pointSizes={activeSizes} getPointKey={getPointKey} faciesNames={faciesNames} stateHeader={stateHeader} />
                                    <USSLPlot data={validData} pointColors={activeColors} pointSizes={activeSizes} getPointKey={getPointKey} stateHeader={stateHeader} />
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <GibbsPlot data={validData} type="cation" defaultTitle="Gibbs: Cation Dominance" pointColors={activeColors} pointSizes={activeSizes} getPointKey={getPointKey} stateHeader={stateHeader} />
                                        <GibbsPlot data={validData} type="anion" defaultTitle="Gibbs: Anion Dominance" pointColors={activeColors} pointSizes={activeSizes} getPointKey={getPointKey} stateHeader={stateHeader} />
                                    </div>
                                </div>
                                <div className="lg:col-span-4 flex flex-col gap-8">
                                    <DonutChart data={stats.facies} colors={faciesColors} sizes={faciesSizes} onColorChange={handleFaciesColorChange} onSizeChange={handleFaciesSizeChange} onNameChange={handleFaciesNameChange} defaultTitle="Hydrochemical Facies" />

                                                <th className="p-4">State</th>
                                                <th className="p-4">District</th>
                                                <th className="p-4">Block</th>
                                                <th className="p-4">Location</th>
                                                <th className="p-4">EC</th>
                                                <th className="p-4">SAR</th>
                                                <th className="p-4">USSL</th>
                                                <th className="p-4">Facies</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 transition-colors duration-300">
                                            {validData.map((d, i) => (
                                                <tr key={i} className="hover:bg-slate-50 transition-colors group">
                                                    <td className="p-4 text-slate-500 font-mono">{d._calc.sl}</td>
                                                    <td className="p-4 text-slate-600 font-medium">{stateHeader ? d[stateHeader] : '-'}</td>
                                                    <td className="p-4 text-slate-600 font-medium">{distHeader ? d[distHeader] : '-'}</td>
                                                    <td className="p-4 text-slate-600 font-medium">{blockHeader ? d[blockHeader] : '-'}</td>
                                                    <td className="p-4">
                                                        <div className="font-bold text-slate-900">{d._calc.locName}</div>
                                                    </td>
                                                    <td className="p-4 font-mono text-slate-700 group-hover:text-blue-600 transition-colors">{d._calc.ecVal || '-'}</td>
                                                    <td className="p-4 font-mono text-amber-600 font-bold">{d._calc.sar.toFixed(2)}</td>
                                                    <td className="p-4">
                                                        <span className="px-2 py-1 rounded-md text-[10px] font-black" style={{backgroundColor: usslColors[d._calc.ussl]+'20', color: usslColors[d._calc.ussl]}}>
                                                            {d._calc.ussl}
                                                        </span>
                                                    </td>
                                                    <td className="p-4">
                                                        <span className="px-2 py-1 rounded text-[9px] font-black" style={{backgroundColor: faciesColors[d._calc.facies]+'20', color: faciesColors[d._calc.facies]}}>
                                                            {faciesNames[d._calc.facies] || d._calc.facies}
                                                        </span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-xl animate-fade-in transition-colors duration-300 flex flex-col p-4 gap-4 h-[750px] w-full">
                                <div className="flex flex-col md:flex-row md:justify-between items-center bg-slate-50 p-4 rounded-[1.5rem] border border-slate-100 gap-4">
                                    <div className="text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2">
                                        <i className="ph ph-map-pin text-rose-500"></i> Geospatial Distribution
                                    </div>
                                    <div className="flex flex-wrap items-center gap-4">
                                        <div className="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">
                                            <i className="ph ph-info text-rose-500"></i>
                                            <span className="text-[9px] font-bold text-slate-500">Plotting {validData.length} Valid Samples.</span>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <span className="text-[10px] font-black uppercase text-slate-400">Color Map By:</span>
                                            <div className="flex bg-slate-200 rounded-2xl p-1 gap-1 border border-slate-300 shadow-inner">
                                                <button onClick={() => setColorBy('facies')} className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all border-b-4 active:border-b-0 active:translate-y-1 ${colorBy === 'facies' ? 'bg-emerald-500 text-white border-emerald-700 shadow-sm' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>Hydro Facies</button>
                                                <button onClick={() => setColorBy('ussl')} className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all border-b-4 active:border-b-0 active:translate-y-1 ${colorBy === 'ussl' ? 'bg-blue-500 text-white border-blue-700 shadow-sm' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>USSL Class</button>
                                                {stateHeader && <button onClick={() => setColorBy('state')} className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all border-b-4 active:border-b-0 active:translate-y-1 ${colorBy === 'state' ? 'bg-fuchsia-500 text-white border-fuchsia-700 shadow-sm' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>State</button>}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex-1 relative rounded-[1.5rem] overflow-hidden shadow-inner border-4 border-slate-100" style={{ minHeight: '400px' }}>
                                    <div ref={mapRef} className="absolute inset-0 z-10 bg-slate-200" style={{ width: '100%', height: '100%' }}></div>
                                    
                                    {!hasCoordinates && (
                                        <div className="absolute inset-0 z-[1000] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm">
                                            <div className="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center text-center max-w-sm border border-slate-200">
                                                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center text-3xl mb-4">
                                                    <i className="ph ph-map-pin-line"></i>
                                                </div>
                                                <h3 className="font-black text-slate-800 text-lg mb-2">No Valid Coordinates Found</h3>
                                                <p className="text-xs text-slate-500 leading-relaxed">
                                                    We couldn't detect "Latitude" or "Longitude" columns in your active dataset, or the selected filter combination does not contain any locations with geographic data.
                                                </p>
                                            </div>
                                        </div>
                                    )}

                                    <div className="absolute bottom-6 right-6 z-[500] bg-white/95 backdrop-blur-md p-4 rounded-2xl shadow-xl border border-slate-200 max-h-[250px] overflow-y-auto custom-scrollbar min-w-[180px]">
                                        <h4 className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-3 border-b border-slate-100 pb-2 sticky top-0 bg-white/95 backdrop-blur-md">Interactive Legend</h4>
                                        <div className="space-y-2 text-[10px] font-bold text-slate-700">
                                            {(colorBy === 'state' && stats.states ? stats.states : colorBy === 'ussl' ? stats.ussl : stats.facies).filter(s => s.count > 0 || rawData.length === 0).map(s => {
                                                const currentColor = (colorBy === 'state' ? stateColors[s.key] : colorBy === 'ussl' ? usslColors[s.key] : faciesColors[s.key]) || '#334155';
                                                const currentSize = (colorBy === 'state' ? stateSizes[s.key] : colorBy === 'ussl' ? usslSizes[s.key] : faciesSizes[s.key]) || 1.0;
                                                return (
                                                    <div key={s.key} className="flex items-center justify-between gap-3 group">
                                                        <div className="flex items-center gap-2">
                                                            <label title="Click to change color" className="cursor-pointer relative w-3 h-3 rounded-full border border-slate-200 shrink-0 shadow-sm overflow-hidden flex ring-offset-1 hover:ring-2 ring-blue-400 transition-all" style={{ backgroundColor: currentColor }}>
                                                                <input 
                                                                    type="color" 
                                                                    value={currentColor}
                                                                    onChange={(e) => colorBy === 'state' ? handleStateColorChange(s.key, e.target.value) : colorBy === 'ussl' ? handleUsslColorChange(s.key, e.target.value) : handleFaciesColorChange(s.key, e.target.value)}
                                                                    className="opacity-0 absolute -inset-2 w-10 h-10 cursor-pointer"
                                                                />
                                                            </label>
                                                            <input 
                                                                type="number" min="1" max="25" step="0.5" 
                                                                title="Change Point Size"
                                                                value={currentSize} 
                                                                onChange={(e) => colorBy === 'state' ? handleStateSizeChange(s.key, parseFloat(e.target.value)) : colorBy === 'ussl' ? handleUsslSizeChange(s.key, parseFloat(e.target.value)) : handleFaciesSizeChange(s.key, parseFloat(e.target.value))} 
                                                                className="w-10 text-[9px] py-0.5 px-0.5 bg-transparent border-b border-slate-300 focus:outline-none focus:border-blue-500 font-mono text-center shrink-0"
                                                            />
                                                            
                                                            {colorBy === 'facies' ? (
                                                                <input 
                                                                    type="text" 
                                                                    value={s.name} 
                                                                    title="Rename Facies Category"
                                                                    onChange={(e) => handleFaciesNameChange(s.key, e.target.value)}
                                                                    className="flex-1 w-24 min-w-0 text-[10px] ml-1 bg-transparent border-b border-transparent hover:border-slate-300 focus:border-blue-500 focus:outline-none text-slate-700 truncate"
                                                                />
                                                            ) : (
                                                                <span className="truncate" title={s.name}>{s.name}</span>
                                                            )}
                                                        </div>
                                                        <span className="text-[9px] text-slate-400 font-mono shrink-0">n={s.count}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )
                    }
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
