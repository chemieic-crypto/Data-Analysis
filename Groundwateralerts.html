                            <div className="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden mb-8">
                                <div className="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center flex-wrap gap-4">
                                    <h2 className="text-xl font-bold text-gray-800">District-wise Summary</h2>
                                    <div className="flex items-center gap-6">
                                        <div className="flex gap-4 text-xs">
                                            <span className="flex items-center gap-1"><div className="w-3 h-3 bg-emerald-500 rounded"></div> Safe</span>
                                            <span className="flex items-center gap-1"><div className="w-3 h-3 bg-orange-500 rounded"></div> Marginal</span>
                                            <span className="flex items-center gap-1"><div className="w-3 h-3 bg-red-500 rounded"></div> Unsafe</span>
                                        </div>
                                        {districtSummaryData.length > 0 && (
                                            <button 
                                                onClick={exportSummary}
                                                className="px-4 py-2 rounded-lg font-bold text-white bg-gradient-to-b from-amber-500 to-amber-700 border border-amber-800 shadow-[0_4px_0_rgb(146,64,14)] hover:from-amber-400 hover:to-amber-600 active:shadow-none active:translate-y-[4px] transition-all flex items-center gap-1.5 text-xs"
                                            >
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                                Export Table
                                            </button>
                                        )}
                                    </div>
                                </div>
                                
                                <SummaryTable data={districtSummaryData} isDistrict={true} manualTotals={manualTotals} onManualTotalChange={handleManualTotalChange} />
                            </div>
                        )}

                        {activeTab === 'map' && (
                            <div className="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden p-4 mb-8">
                                <MapContainer data={rawData} limits={limits} geoJsonData={geoJsonData} />
                                <div className="mt-4 grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-emerald-50 p-3 rounded-lg border border-emerald-100 flex items-center gap-3">
                                        <div className="w-4 h-4 rounded-full bg-emerald-500"></div>
                                        <span className="text-sm font-bold text-emerald-800">Safe: All parameters within acceptable limits</span>
                                    </div>
                                    <div className="bg-orange-50 p-3 rounded-lg border border-orange-200 flex items-center gap-3">
                                        <div className="w-4 h-4 rounded-full bg-orange-500"></div>
                                        <span className="text-sm font-bold text-orange-800">Marginal: Above Acceptable, below Permissible</span>
                                    </div>
                                    <div className="bg-red-50 p-3 rounded-lg border border-red-100 flex items-center gap-3">
                                        <div className="w-4 h-4 rounded-full bg-red-500"></div>
                                        <span className="text-sm font-bold text-red-800">Unsafe: Above Permissible (or pH out of range)</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Limits Config */}
                        <div className="bg-white rounded-xl shadow border border-gray-200 overflow-hidden no-print mt-8">
                            <button onClick={() => setShowLimits(!showLimits)} className="w-full bg-slate-50 hover:bg-slate-100 px-6 py-4 flex justify-between items-center transition">
                                <h3 className="font-bold text-slate-700">Standards Configuration (IS 10500:2012)</h3>
                                <span className="text-sm text-blue-600 font-bold">{showLimits ? 'Hide' : 'View/Edit'} Standards</span>
                            </button>
                            {showLimits && (
                                <div className="p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 bg-white border-t border-gray-100">
                                    {Object.keys(limits).map(param => (
                                        <div key={param} className={`p-3 border rounded-lg ${limits[param].isStrictRange ? 'bg-blue-50 border-blue-200' : 'bg-slate-50'}`}>
                                            <div className="text-[10px] font-bold text-slate-500 mb-2 truncate uppercase tracking-tighter">
                                                {param}
                                            </div>
                                            <div className="flex gap-2">
                                                <div className="flex-1">
                                                    <label className="text-[9px] block text-gray-400 font-bold">ACC.</label>
                                                    <input type="number" step="0.01" value={limits[param].acc} onChange={(e) => updateLimit(param, 'acc', e.target.value)} className="w-full p-1 border rounded text-xs font-bold" />
                                                </div>
                                                <div className="flex-1">
                                                    <label className="text-[9px] block text-gray-400 font-bold">PERM.</label>
                                                    <input type="number" step="0.01" value={limits[param].perm} onChange={(e) => updateLimit(param, 'perm', e.target.value)} className="w-full p-1 border rounded text-xs font-bold" />
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
